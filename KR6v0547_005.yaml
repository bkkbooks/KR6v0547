body:
  text: 寺院下羅漢壁靜室共四十九處萬佛堂在羅漢壁撒手處之東懸崖萬仞竹樹參映纍石架木別具勝致萬曆丙辰僧洪詔建先有寂光寺僧心宗持鉢盛八功德水傾於崖下因以成泉至今不竭安心處在西來寺之東二里許屋止三楹附崖而搆窄處梯棧為階老樹修竹交映左右崇禎甲戌僧性超建撒手處在楊黼洞左下臨懸崖勢頗危仄而結搆精好左有小樓坐攬雲山別具靜遠之致天啓甲子僧廣高建大錯和尚為之題額棲真處在楊黼洞傍天啓年僧還真建今廢半空庵即幻空靜室右碧雲寺上乃張直指與幻空老僧問答處天然室在寶印庵之東今廢寶印庵在停雲庵之東今廢停雲庵舊名還真室在寶印庵西僧還真建還慈室在半空庵之左今廢普光庵即還普靜室在半空庵之右崇禎年僧還普建體然庵在普光庵下崇禎年建一笑軒在體然室之下崇禎年建自覺庵即覺融靜室在碧雲寺下水井之上萬曆年僧覺融建今廢貫徹室在水井之旁崇禎年建今廢甘露軒原名會心室在碧雲寺左僧元然建今廢休歇處在四觀峯西北四五里許其下出泉峯頂比丘汲飲於此萬曆年僧來秀建僧廣和曾隱於此今廢古佛洞團標在華首門西古佛洞之下今荒廢望北庵在插屏山崖上萬曆年僧幻空棲靜於此今廢獻果庵即魯擺靜室在藏頭庵西昔魯擺老僧棲靜於此有老猿來為之執㸑今廢桃源庵在小桃源洞前今廢摩雲居在兜率庵右今廢海印庵在伏虎庵旁今廢廣西室在軟瀑之旁今廢青齋庵即山東靜室在收蛇洞門前今廢洛伽庵在猴子洞昔大千和尚居靜於此今廢磐陀石團標在放光寺西盤陀石上石附崖而起高數十丈僧歸空結茆於上架橋以登俯視千崖萬壑最為奇險今團標尚存悉怛多室在飛鳳嶺之左太古庵右萬曆年僧如琳居靜於此太古庵在覺靈寺右嶺上昔僧老古棲靜於此穴土為洞人呼為老古洞淨業居在放光寺御藏閣之左昔僧淵明閲藏於此今廢葉子蓬在放光寺左崖下旁有怪石澄泉萬曆年有江南僧居靜於此今廢衡陽庵即嶽山靜室在放光寺下三里許嶽山石洞之旁清流激湍映帶左右昔南嶽僧禪隱於此今廢寶山室在凌霄庵之下鐵腳寶山居靜於此今廢靜居林在聖峯寺之左半里許僧真利建般若崖室在白雲寺之左崖上僧定雲結茆於此今廢紫柏崖室在白雲寺右嶺崖上聖峯寺僧結茆於此今廢楞伽居在紫柏崖西僧真利建今荒廢大雲庵舊名法雲室在聖峯寺左二百步崇禎年僧法雲建今廢法行室在彌勒院左兜率石傍僧法行建今荒廢寶光庵即𦦨光室觀音庵左隔澗里許僧𦦨光建今廢齊雲庵在楞伽石之下萬曆年建徽州僧居靜於此今廢會雲居在楞伽居之右體如軒在補處庵下里許崇禎壬申僧周用建松雲堂在體如軒左僧周正建智印室在體如軒右崇禎間僧周悅建禪心室在體如軒之右嶺下崇禎年僧洪海建丹霞庵即自朝靜室在補處庵左嶺下僧自朝建全真室在燃燈寺後嶺上二里許昔有羽人煉丹於此今廢栴檀林靜室共十三處煙霞室在栴檀林玉霖軒右嶺下二里眠獅石之左天啓元年僧覺明建玉霖軒在栴檀林老僧崖下左有懸瀑天啓年僧殊勝創建其徒學蘊參禪於此止水室在積行庵右嶺隔澗半里許崇禎年僧讀談建素雯居即年礙室在玉霖軒左崇禎年僧無礙建今廢畢婆室在栴檀林崇禎間僧淡惺建今廢止月廬在栴檀林崇禎間僧德明建今廢碧桃軒舊為學弘靜室在素雯居之上崇禎年建今廢赤曇庵即隔凡室在老僧崖上崇禎間建今廢半山舫原名大乘室在栴檀林望臺之西崇禎年僧大乘建今廢梨花庵即了塵室在半山舫西天啓年建今廢野雞蓬在老僧崖右崇禎間建今廢無疆室在老僧崖下崇禎年建今廢松竹居在栴檀林今廢獅子林靜室共四十二處念佛堂在獅子林前有小樓俯瞰萬壑竹樹深映境頗幽勝萬曆四十七年僧圓燦建後有石漏泉康熙丙寅僧教盛真行募鶴麗鎮總兵王珍重建雲深處在念佛堂之右藏海蓮居在念佛堂之下天啓年僧隱空建觀音崖室在藏海蓮居之下萬曆年僧大力習靜於此開闢獅子林為諸靜室之始吼天坪在獅子林左嶺一名大靜室天啓年一明建崇禎間僧野愚擴大之六波羅密在念佛堂左天啓年僧玄月結茆于此崇禎間僧圓常就其址建一大草閣四圍搆六小靜室故名圓明室在六波羅密之左崇禎年建松月阿在獅子林吼天坪之下天啓三年僧念誠建大錯和尚來遊為題是名守白室在圓明室後崇禎年僧玄谷建石笋庵即無心室在圓明室左僧無心建普照室在獅子林六波羅密之右康熙丙寅僧寂法照明重建改顏東林精舍燦輝室在獅子林松月阿之下今廢鼻峯舍在獅子林右嶺崇禎十三年僧道真建雪岸居在鼻峯舍右崇禎十二年僧玄指建石彈軒在雪岸居右崇禎十六年僧玄聞建慧光庵即慧光靜室在雪岸居之上僧玄竅建無宗庵在石彈軒右嶺上今廢和光室在雲深處之右天啓年間僧道偕建翠宇室在和光室下天啓年僧性淑建若野室在垂虹居之右腋支秋庵在若野室之下旁有湧泉崇禎元年建乃仙陀棲禪處氷雪庵原名約宇室在吼天坪之右崇禎年僧約宇建太清居在念佛堂之上倚天庵在太清居之上即石廣洞之左今廢純持室在倚天庵之左前有片雲石今廢智行室在普照室之上今廢還忠室在守白室之上前有壽星崖今廢青霞居在無心室之下遍空居在無心室之右黃玉居在珠簾水之左彌陀室在松月阿之下萬曆三十七年僧寶峯建慧劍庵在無宗室之下今廢太素庵在石彈軒之下今廢密用室在太素庵之左今廢曉天庵在容宇室右箐中石洞邊今廢無塵室在曉天庵之左石壁下今廢虛白居在若野室之右容與處即容宇室在曉天庵之左嶺上垂虹居即永川室在若野室之左肩上惠通庵即惠肰室在虛白居之右林泉室在獅子林之麓幻住庵後里許崇禎年僧天香建康熙丙辰河南僧參惺募翁大元重修九重崖靜室共一十五處一衲軒在九重崖背倚高嶺面俯西山地宇宏厰重閣相向崇禎二年麗江土知府木增同僧道源建𢈏寅年災僅存後樓寒山樓在九重崖白鹿洞下奇石怪樹層繞左右地不甚廣而野花雜卉頗極崖居之趣崇禎元年僧道乘建山月扉在白鹿洞下寒山樓之東崇禎三年僧玄悟建今廢瑞雲軒即應機室在一衲軒下天啓元年僧應機建法義室在瑞雲軒下天啓二年僧讀宣建靜觀庵舊為文璽室在法義室上河南僧文璽習靜於此二十餘年足不越戶木庵在一衲軒左僧道真建今廢知宗室在山月扉下僧玄理建今廢枕流居在自得庵之上僧玄象建今荒廢自得庵即道本室在枕流居下僧道本建今廢太玄庵舊名大定室在自得庵之左僧大定建今廢韜光室在山月扉東今廢美庵室在九重崖白鹿洞下寒山樓之上今廢柔知庵即月庵室在枕流居傍僧月庵建今廢純白室在白鹿洞下寒山樓之下崇禎年間僧玄契建附諸庵院靜室共五十二處緑淨山房在天池山下鉢龍室前毗沙精舍之右砥石正當其前左為倒影池居士曾沛霖建康熙癸亥僧淨徹重修毗沙精舍在白雲居右崇禎年羽士曾高明建鉢龍室在天池山下毗沙精舍之右天啓年僧瓊明建覺容室在片玉山前古雪齋下百步許萬曆年建今廢不二軒在滿月山下悉檀寺後天啓元年僧沖虛建斷際處在五華庵上僧寂定建翠柏居在圓淨庵左天啓元年僧洪時建華池室在圓淨庵右崇禎十五年僧三池建柔緑軒即無為室在法界庵之左崇禎十年僧無為建處約室在法界庵右崇禎四年玄要建肅月軒即恆肰室在五華庵左僧恆肰建不知處在無我庵右僧周璧建康熙甲寅僧廣䛿重修改顏鹿野苑拈花精舍在圓淨庵右嶺萬曆年僧釋禪建今廢貝葉齋在悉檀寺法雲閣之旁摩訶室在大乘庵右崇禎年僧淵明建康熙丙辰僧洪希同吳文華重修改顏拈香室中峯室在圓通寺左僧玄修建灑陀軒在卿雲庵左僧玄頂建隱空居在卿雲庵右僧玄同建離釣室在潮音閣內置帚居在龍華寺內大雲居在龍華寺左隔澗百步許嘉靖年僧周徹建法興室在西竺寺後煉魔室在萬壽庵之右昔有河南僧煉魔於此今廢優曇室在千佛寺左僧學選建寬宇室在法華庵右康熙壬子僧洪紀重修題顏兜樓室古鏡室在水月庵下今廢雲鶴塢在水月庵內天啓年僧書佑建滿月軒在水月庵右崇禎年僧書奇建康熙壬子僧行照同吳文華重修靈源精舍在法華庵右隔澗半里許萬曆己丑僧寶會居靜於此後遷建為靈源庵今廢燃燈室在燃燈寺之下今廢蘷宇室在雲海庵內崇禎三年僧性倪建康熙甲寅僧寂崇募修持心室在雲海庵右萬曆二年僧明真建康熙丙寅僧仰默重修楞伽室在華嚴寺後檀溪崖上崇禎辛巳僧靈相建康熙壬子僧普胥重修清音室在大士閣左澗中玩虎居在報恩寺左天啓年僧昭印建康熙壬申僧抱璞重修水雲居在傳衣寺後崇禎八年僧了愚建可是樓在水雲居左崇禎十年僧覺悟建靜笑居即定庵室在水雲居前天啓年間僧定庵建幻智樓在圓通庵後萬曆年僧釋禪居靜於此崇禎元年僧空宗寂光重建懶雲窩在淨雲庵內無我室在淨雲庵內懷玉團標在雷音寺內羽士懷玉建寄寄齋在九蓮寺左天啓四年僧覺用建康熙辛未蜀僧自證重建秋雪庵即彼岸室在傳衣寺左箐中今荒廢福緣林在秋雪庵之左僧雲谷建今廢淨雲室在羅摩苴箐萬曆四十二年僧覺心建梅隱庵舊為無方室在東瓜邑山天啓年僧無方建今廢金華室在金華庵之下三里許問天處即體微室在翔龍寺之前半里許僧體微建瑞蓮精舍在雞坪關天啓二年僧釋禪建謝撫軍遊此值沼生瑞蓮故名碧雲山房在牟尼山上十里許僧釋禪建麗江府知府木增重修今荒廢蓮花山房在大石洞山上十里許僧釋禪建今廢亭景星亭在四觀峯與善雨亭相對今廢八角亭在曇花庵內今廢觀瀑亭在牟尼庵之後天啓六年賓川州守蔣爾第建今廢四無亭在放光寺門首金剛石上守州蔣爾第建今廢仰高亭在羅李坊之上直指周懋相建久廢康熙三十一年僧慧輝重建善雨亭在四觀峯今廢旅亭在獅子林翠雨室內松陰亭在尊勝塔院後振衣岡上坊雞山勝概坊在銅瓦殿左側舊稱為一禪天雙松為柱懸額于中路經其下今樹老而額廢矣羅李二先生坊在迦葉殿左峽仰高亭之下賓守李世申建考羅李二先生當是羅近溪李中溪此坊之立巡按周懋相之命也復建仰高亭於坊上周有仰高亭記載藝文中述景仰兩先生之意甚詳後人誤以為羅念庵實非也羣峯拱聖坊在聖峯寺門前大理王治中建今廢覃恩坊在放光寺三門萬松深處坊在寂光寺門前響雪橋之上今廢聖旨坊在悉檀寺三門驀直去坊在悉檀寺門右百步許鳥鳴蟬噪坊在體一橋上地勝龍靈坊在大士閣左澗西來第一坊在大士閣門內直指周懋相立三腳坊在息陰軒右路旁今廢竹林清隱坊在傳衣寺門前直指毛公建撼雲篩月坊在傳衣寺門左蓬萊初地坊在接待寺門前今廢靈山一會坊在沙址村上報恩寺之下萬曆癸卯直指宋興祖立有修坊田附在寂光大覺二寺康熙己巳僧普宜同合山重修賓鄧交界坊在檀花箐廟上土主廟在四觀峯藏經閣之後祀信峕景帝土主乃蒙氏所封金馬碧雞之神也中土主殿在迦葉殿內祀沙音灼漠土主相傳此神自西域隨護迦葉尊者至此又稱為迦葉土主云下土主廟在靈山一會坊之右其神即迦葉殿土主土人每以血食享之崇禎年有陝西僧惡其污穢告經巡道移神于沙址以便血食云沙址土主廟在下土主廟之下其神即沙址村土主也二母古窟土主廟在九重崖後山畢鉢羅窟山神廟在華首門左百步許僧正用建大龍王廟在悉檀寺左大龍潭上僧釋禪建小龍王廟在尊勝塔院之北西顧山下僧道真建聖母龍王廟在河子孔有上下二處土地廟在迦葉殿門前祗陀松下僧廣高建橋五葉橋在拈花寺右五里許石蟇江上俗誤呼為百接橋考百接橋原在拈花寺前寺未建時山道泥淤土人以方木數十根連接其上以便往來故名百接今既成坦途舊橋久廢人遂以五葉橋為百接橋其順非有如此者洗心橋在雪陰橋右雪陰橋在河子孔下諸溪水合河子孔水俱由此橋下出今誤以此為洗心橋其實洗心橋別在此橋之東人罕由焉華津橋在九蓮寺前半里許僧本達性杲重建石梁橋在報恩寺上葫蘆澗中體一橋在悉檀寺前半里許天啓四年僧玄同造響雪橋在寂光寺下大覺寺上青龍橋在華嚴寺路左寶華池上德水橋在華嚴寺路右黃沙溪之上伏龍橋甃亂石為之在大龍潭之前和光橋在白沙嘴下五里許麗江府造逍遙橋在法界庵西倚杖溪上時大錯和尚修志片雲居擔當老人隱居寶蓮庵無盡禪師寓斷際處恆與仙陀眼藏諸衲子間遊至此倚杖逍遙故名九溪橋在九子溪下由首傳寺過燃燈寺處坦步橋在大覺寺內軟碧池上橫板相連長一丈一尺濶八尺方正寬平不為斜陡履道坦坦足稱幽人之步康熙壬申僧廣慈改修為石橋三笑橋在白雲居門內秋月池上還源禪師隱於此者二十年送客不過橋一日大錯和尚同眼藏來訪還源不覺送過是橋眼藏云遠公乃過虎溪耶三人大笑而別橋遂以此得名松鶴橋在象石村之上三里許天啓年鄧川庠生包大任建一心橋在雞次坪下三里許僧一心建往來者因號名橋至今相延不復更矣天生橋在白沙嘴之下四里許兩岸各有一大石負岸而起對橫溪上東西相接闕處僅三尺許往來者由焉遂號為天生橋
