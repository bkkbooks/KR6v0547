body:
  text: 山水上野史氏曰山祖崑崙水源星宿普散寰宇起伏回旋變態不一古今紀述多以一二言形其竒勝簡而文精而辨後之觀者臥遊是賴矣志山水山雞足山一名九曲巖實居南徼古屬西域此名雞足山梵語云屈屈叱播陀由漢唐而附中國至蒙古始入版圖考傳法正宗及晉僧法顯傳印土名山記大唐西域記諸書知為迦葉尊者入定處故其山遂與五臺蛾普陀九華並傳即大明一統志亦載洱海東北百里有雞足山滇志載賓川州西北七十里有雞足山與郡志相符蓋此山發脈崑崙即南支龍也由西番雪山中出一脊環麗江府西南峯巒秀起插日凌空曲折南行為鶴慶府西岡劍川州東山又南行二十餘里層巒疊嶂劃分兩支一支自西南橫亘連岡經浪穹後嶺結為大理府之點蒼山一支綿延回折繇東南行經南北兩衙玉絲等場當洱海東北或起或伏東度三澗門聳為青檀山北度檀花箐特起為雞山頂峯背抵西北面向東南自峯頂環觀山形前分三岡後拖一嶺若前伸三爪後支一距宛然雞足形也後一支繇巔西北下四十餘里至大石頭而止前三支中列兩大溪衆泉奔送中支自頂巔下垂繇銅佛殿迦葉殿慧燈菴至勝峯寺自勝峯之右趺脈又繇凌霄圓覺兩菴之右下五里為華嚴寺又下三里為萬松菴又下二里結傳衣寺至此地勢平曠庵院凡十餘處東西兩峯宛然環拱繇傳衣寺下盡於接待寺東支亦自頂分𣲖經羅漢壁獅子林九重岩直行回捲而下為西顧山繇山南峙為塔院乃下而盡為報恩寺西支亦自頂橫分繇青檀山回抱起伏三十餘里為白石崖又五六里回龍顧祖乃結為拈花寺前山三支中支與東支自巔至麓各三十里許西支則四十餘里皆蜿蜒起伏錯綜環抱澗樹幽曲梵剎隱映洵西南名勝也山以峯頂為中前後四支環拱自東至西二百四十里南至北二百里山麓周圍四百里考白古記一書雞足山上古之世原名青巔山洞名華陰洞厥山左峯名曰花石回龍峯今羅漢壁獅子林九重崖轉下至文筆山塔院者是也右峯名曰青檀顧虎峯即青檀山太極嶺趺至白石崖仰止臺至拈花寺者是也中一峯名曰鐘靈啓聖峯即絶頂中嶺自迦葉殿勝峯寺趺過華嚴傳衣盡於接待寺者是也迦毗羅國淨梵大王因其山形像雞足遂更名曰雞足山名其洞曰迦葉洞後訛為華首門阿育王時敕長者明智護月李求善張敬成等來創迦葉圓覺龍華石鐘等庵即為名勝之始張敬成即今賓居大王也考釋氏經典諸書皆云迦葉尊者持衣入定雞足山而世人賤近貴遠妄謂西番別有雞足以便逞其荒唐奇怪之説使人渺茫難稽不知滇南在周時版圖未入中國原屬西域之地為阿育王所封且西方哈嘛僧每年來朝雞足者頗多細詢之皆云自古相傳此是迦葉守衣雞足使西方果有雞足又何為遠來朝禮且崇禎𢈏辰烏斯藏大寶法王亦遣其弟子來雞足朝禮迦葉則知此為迦葉入定之處無疑矣按范石湖吳船録唐乾德二年詔沙門三百人入天竺求舍利及貝多葉書有繼業三藏姓王氏耀州人預遣中至開寶九年始歸寺其分記西域行程有曰巍峯曰雞足山曰優波掬多石室曰王舍城曰鷲峯曰溫泉二十餘井曰阿難半身舍利塔曰畢鉢羅窟曰阿難證果塔曰輪王塔輪王即阿育王也又曰塔廟甚多以今考通紀考之吳船録證以梵書法苑珠林稽之畢鉢羅窟鶴慶石寶及阿育王遺迹如酉陽雜俎之説與范石湖皆異代同符則此雞足華首門即迦葉入定之處而西番別無雞足不待辨而自明矣天柱山即雞足中峯今呼為四觀峯者是也自明歌坪攀躋而上十里許方至其巔孤聳峭拔頂垂雲霞之表遠近仰瞻狀同天柱花石山即雞足左峯考白古通名此峯為花石回龍峯又名雞足為花石山即指此山也蓋此山繇東轉南逶迤起伏三十餘里東南一壁陡削千仞嶙峋環抱即羅漢壁獅子林九重岩是也山中名剎多建其下岩壁間茅菴團標不下百所修靜之士居焉其上有石鼓峯點頭峯道冠峯滿月山集賢山重岩洞鳳眼洞最為奇雋青檀山即雞足右峯自山頂西北而下十里許至檀花箐此山峻偉寬平東北與絶頂相對有象王峯蓮花峯古碑岩飛鳳嶺太極嶺西南與蒼山相對有木香坪撒馬場面壁山在華嚴寺熊羆岡上四五里許尊嚴突湧如巨人端坐正向羅漢壁肖達磨面壁之狀象鼻山自明歌坪垂岡而下至然燈寺長三里許宛然象鼻也瓊樓山在放光寺後直連絶頂高十里許此山懸岩峭壁插漢橫空奇樹危石怒突倒垂層級重復有若瓊樓天池山自點頭峯垂下旁出天池還源禪師於其下建白雲居遂隱居焉鳳毛山在寶蓮庵後自仙鶴山垂巒右疊有鳳毛儀彩之狀擔當老人隱居其下鉢盂山在石鐘寺前下有鉢盂庵山形豐隆圓起正當兩澗之間周環觀之宛然鉢盂當胸也馬頭山在白草龍下有泉出於馬頭之下即名馬頭泉羅星山在文筆山之東南沙址村山尾併南村山尾兩交處有山正鎮水口周圍半里紫芝山在雙水澗之上其山紫色如靈芝結朵蒼波山在拈花寺後繇青檀山檀花箐自西而南過金母山白石崖綿亘四五十里至此突起圓峯回對天柱山形如几案蹲象山繇蒼波山之東北轉而西向長二里許為拈花寺對案形如象蹲駢指山自蒼波山之西繇辭佛臺過峽斜拖一支與蹲象山相對松雲山在華嚴寺下萬松庵之後亂松連雲長三里許人行其中者希覯日月臥獅山即南村後山在白石庵下勢如臥獅俗呼為羅磨祖山文筆山即塔院山以其在東上又有塔故名滿月山在悉檀寺後此山從九重崖分脈豐偉端好形如滿月仙鶴山在石鐘寺後山形橫展勢如翔鶴錦霞山在寂光寺後山形聳秀嘗有晴霞冠翼其巔紫雲山即大覺寺後山回偃崇隆形如覆雲鐘靈山在勝峯寺後山形秀美謂為一山靈氣之所鐘也花影山在萂勒地之後又名馬鞍山其峯頭與馬鞍相似鳳凰山在傳衣寺後其山勢如鳳翱翔而下象頭山在大士閣之後形如象頭鼻耳皆具金母山俗名金老太山在河子孔上高四五里嵯峨雄俊正對絶頂金母即聖母也其下有聖母龍王廟白花山在龍華寺之後山勢崇湧因前建有觀音閣遂呼為白花山插屏山在迦葉殿後高岩橫展宛若屏開高鼓樓山在花影山之左天鼓山在滴水崖邊其下空洞人履其上足聲逄逄然嘗有大白蟒出現俗相傳見者主吉集賢山在片雲居之後繇九重崖而下別起一峯穹窿秀出樹石掩映下有流泉繞之凌霄山在凌霄庵後其山自明歌坪側垂而下至此忽突湧宏大寬廣勢欲凌霄西顧山即九重崖盡處與文筆山相對山勢至此回顧中峯巒岫皆似西向青陽山在西顧文筆兩山外相去里許更湧一山豐隆有勢實居震方故得青陽之稱片玉山在九重崖下集賢山之左另聳一峯順崖南行勢不甚遠而瘦削有致如禽翅直豎西來山在白石崖之西此山自青檀山太極嶺層疊起伏回翔幾折至此忽起一山更為雄突自此而下遂為金母山白石崖諸峯皆極奇秀公幹山在雞足山東南自九重崖疊下雞坪關迤𨓦南行起而為朝陽哨坡平原廣衍五六十里突起數峯形如羣仙拜舞東面大河又起而為廣黃山西對煉洞又起為馬益龍山形勢寬舒峯巒磊落為雞山之几案牟尼山在雞足山左峯之外東北去四十里自魚盆甲庒迤𨓦而上突出一峯高二十里山形如蓮花多崖巒洞穴西南與絶頂相望有大石洞鸚鵡郎東北臨金沙江有四角山青石岩大覺山在雞足山東去九十里即賓川東山之支面對雞足山勢崇隆遠近瞻望峯巒最為奇秀上有吉祥寺雞山大覺寺僧遍周建山之西麓又有聖泉庵皆為雞山之別院也峯四觀峯四觀峯即天柱山之高峯乃雞足絶頂處也峯勢𨺗絶四望上聳霄漢秋冬時有積雪青雲籠繞蒼素萬狀攀躡而登至頂平正如舒掌自東及西一里許南北僅八十步張直指建羅城于其上樓四闉東曰日觀西曰海觀北曰雪觀南曰雲觀日觀觀日出也海觀觀洱海也遙望洱水光平如面正當山麓雪觀觀西域雪山也雪山正當西北干霄插漢瑩潔如銀然非清霽素朝不可望見雲觀觀佛灮也夏秋之間天氣明爽有時白雲布滿空界如銀海晃耀即于白雲中現大圓光外暈五六重每重五色中虛明如鏡同觀者雖千百人各見己身不見旁人雖舉手動足拱揖禮拜無不肖像是謂攝身灮又或現圓灮如虹霓又或現白毫灮周圍籠映恆數十里又或黃灮布滿峯頂又或光中現銀船往來篙楫具僃禮佛者齋宿祈禱則佛灮變現種種不一四觀之名繇是而起遊者東繇猢猻梯上西繇束身崖下翠屏峯在捨身崖前一峯附崖並起自南而西高數十丈濶如之橫展如屏自上觀之頂與崖平自下矚之峯身為崖所掩莫可辨識惟自禮佛臺斜眺則別峯森秀𨺗削爭奇與崖乍合乍離回灮互影巧若施設雖江郎三片不為專美矣玉枕峯在四觀峯後狀如玉枕橫峙高可數十尺石鼓峯在九重崖西憑依嶺脊南崖魁傑雄突嶔崎百狀東九重崖西獅子林兩翅橫開若為所掖𨺗聳千仞翠在栴檀林上聳出層雲秀削孤峙象王峯在飛鳳太極二嶺之中其峯突濶寬厰層雲籠映高霞繚繞較諸峯獨為雄秀鳳頭峯在銅瓦殿下突出昻起高四十尺形如鳳頭蓮花峯在象王峯之右岫巒森秀狀若蓮花離離蔚蔚遠浮霞氣之表乃聖僧所居也巖壁捨身巖在四觀峯西南隅下嵌上突憑據其上若飛梯躡空不復知下之仍有地也愚人登此捨身荒徼冥頑化之不可憫之者甃磚為垣以阻之今環為城墉足迹罕至此風遂絶矣華首門一名迦葉門載通志華首門在四觀峯南側巖如平劈高數百仞廣且數倍巖壁有痕內剜厥狀如門雙闕宛然上簷飛突丈餘周回隆起圜扉對掩中裂一隙其門左右各三丈三寸高倍之所謂迦葉奉佛金縷衣入定處也壁間餘瀝津津遊人取以洗目俗呼為眼藥水崖向西南終夕烜暘而水不盈勺朝暮嘗盈夙稱靈異加之此巖平削千仞仰視矗𨺗俯瞰無際而門嵌其中鬼斧神工至此窮絶東自猢猻梯西並捨身崖以抵束身峽橫亘二里俱自山頂平剖直下至此疊為細紋緣如腰帶鑿壁為路行者隨紋躡縷恍若蟻之緣壁從此下墜尚有數級乃抵放光寺上眺則縷紋交疊繚白摺青且面曝西暘苔草雜色雖丹青窮巧不能繪其錯麓矣按大理府志迦葉門俗呼為華首門此迦葉波入定之地在雞足山頂唐南詔永貞間有僧小沈與二僧同結茅雞足一日自城歸見二僧問食二僧曰汝從城來反索食於我耶小沈遂走叩迦葉石門訇然中開二僧追呼至則石門閉矣二僧悔恨焚身門外焚處生柏二株或謂小沈乃迦葉化迹也滇志同又按通志李逸民遊山記嘉靖間有一僧自遠來徑投石門結草以居自誓苦行三年滿而後去期滿之夕夢石門忽開中有多僧延之使入見殿宇金碧門上各有金字對聯惟正殿有金鎖不開左堂僧衆皆默坐右堂如齋厨設供謂僧曰汝勿去得乎僧曰吾有願欲遊名山尚未得住也言已而窹猶記對聯識而藏之屏風崖在華首門下放光寺之後高三十餘丈濶亦如之直插橫開如斧削石磨左右勻停宛然玉屏也羅漢壁羅漢壁在四觀峯東從仰高峽橫突而起西抵旃檀林𨺗壁橫開崚嶒聳疊垂綃捲幛連亘四里西來寺嵌其西隅為陝僧所棲碧雲寺綴其東坳為燕僧所止而西來一帶崖壁尤奇拏雲激浪凹突崎削回曲萬狀崖下靜室刳壁纍石高下駢嵌若蜂房燕窠咸剜木筧泉互相貫注以資瓢鉢觀音崖在獅子林雪印靜室之下般若崖在羅漢壁下側倚東澗另闢巉岏禪師古亭結精廬其間名般若庵緣石磴而登俯瞰壑中梵剎攢隱仰瞻翠嶂樹石蒙叢幽險之觀此亦稱最矣紫柏崖在羅漢壁下白雲寺右嶺上原有靜室今廢霹靂崖在鉢龍室之後絶境天開聳削異勢煙嵐旋繞樹石錯映朝昏變橫側殊態觀者危心遜目不能自已勒馬崖在獅子林左高可百仞其崖頭勢如奔出而能頓駐有勒馬之勢九重崖九重崖在石鼓峯東從羅漢壁而來嶺岡東行至此回掉與西峯相顧其崖上負岡脊下臨層巒聯羅漢壁特角互峙前對青巔曰如翠屏嵐幕下視衆壑凸凹差互剎宇隱見松檜層深山中勝境獨此隱僻東崖人迹罕及自非一念精修之士鮮或棲焉岩東石竅有泉珠迸分給諸廬岩畔有飛石覆空而懸若墜復倚觀者危之蕉鹿崖即九重崖回龍峯也白石崖白石崖在南山東陲乃雞足西峯將盡之處回巒北向返拱正峯石骨玲瓏竅孔空漏穿穴互通出沒隱見而石色瑩白少雜赭翠天劃神鏤莫喻其巧雲邑楊氏憑崖架閣梯空而居加以此境別出不附衆山徑曲途隱俗駕莫遘可謂棲幽之勝境矣滴水崖即玉龍瀑懸崖在天鼓山之下千章叢雜崖壑層深加以懸瀑飛流上下者至此鮮不駐足遡觀移時嘆賞重陰崖在獅子林慧光靜室之上半里許崖高數丈其下容四五人深林密翳雖亭午杲烈不見曦影猢猻梯在銅瓦殿後乃絶頂峯巖下垂之脊石齒稜稜僅可容足壁立𨺗上五十餘級落手投足支膝抵胸始得進步登者不得下視下視則魂搖足酸不能自主按郡志名覩光梯石磴嶙層高數十仞遊人匍匐而上此間望佛光出現更為明顯壽星崖在獅子林守白靜室之上高數十尺孤孑挺拔狀若南極老人之首千花崖在九子溪東壁嶔嵌疊磊異卉叢生回嵐隱映如纓絡貫花佛手崖在袈裟石左插空支聳正如佛掌橫舒背光崖大背光崖小背光崖在華首門之上四觀峯之下懸崖萬尺壁立如斧削左右稍作回曲如佛背光此崖奇險冠絶一山雖猿猱不能升也獅子口在大觀閣西三里許南北兩崖傑峙爭高中通一路如咽喉有踞之地吞天之狀金猊崖在小華首門崖下懸壁直下削如立掌中突崖頭長數十尺形如狻猊左顧青獅右望白象宛然三大士所乘跨也青獅崖在小桃源洞前與金猊崖相去三十餘丈白象崖在收蛇洞前金猊青獅白象三崖極威雄踞伏之勢而金猊稍大尤魁傑也滴雪崖在九子溪頭初獻水之上長離崖在插屏山後文心雕龍云彩如宛虹之奮髯光若長離之振翼宛虹龍也長離鳳也是崖之得名蓋本於是文殊崖在文殊閣舊址之上疊書崖在小華首洞右崖石層摺纍數十疊苔繡草衣剝蝕茸襯宛然書史堆疊上有軟瀑紛披而飛嵐濺霧甚具奇致楞伽崖在藏頭庵上以其險絶不可往故名又曰玄鹿崖小猢猻梯在龍吟壑之西懸級危仄攀附而登繇猴子洞至藏頭庵古碑崖在木香坪半山其地有觀音顯化碑檀溪崖在華嚴寺後俯臨深溪上下懸絶莫可攀倚楞伽室即建其上聚仙崖在檀溪之西相去里許栴檀林在羅漢壁獅子林之下其上則崖壁插空巒岫阻日稍隱而下幽崖叢柯回映負險加以深洞迷嵐懸流絶嶂層林雜木凌空交合一念精修之士多或憑崖結室依石支廣肰而遊軒罔過界宇孤僻所謂修修釋子渺渺禪棲真堪托勝怡情永絶塵慮矣洞玄關洞在禮佛臺前三面絶壑下懸突石駢倚其上中迸成隙東西交透西穴下臨棧木嶄壑而度繇穴洞宛轉東出即躡小石臺俗呼為太子過玄關洞穴竒險於斯為最石漏洞在石漏泉之左深可丈許中出泉如石漏文殊洞在絶頂後文殊閣旁今閣圮廢故址尚存仙奕洞在文殊洞前虎跳澗之上相傳仙人奕棋於此故名其上有棋枰石今誤為真武洞獅子洞在龍吟壑右覺林寺址之上懸崖西突自玄關層纍下墜中橫一線側嵌其間其門東向中不甚深惟外徑𣣱繞緣崖引棧披煙躡虛有若猿猱之捫歷矣石廣洞一名雲歸處在獅子林陝西僧靜室之右高丈許深一丈四尺昔有僧棲禪其中以石為牀竈今存焉白虎洞在伏虎庵拜佛石下此洞乃一片大石橫架而起中可坐十餘人斜陽洞在神足峽東洞不甚深但高而難登洞前有石柱一根好竒者梯之而上如猿猱之緣木也其洞面向檀花箐斜陽對照晚霞麗空洞中晴晃別一天地古佛洞古佛洞在八功德水之上石竅橫并儼若胡牀僅堪容膝落伽洞落伽洞俗名猴子洞在魯擺室削壁下洞出清泉四時不竭昔有行僧大千隱居於此法師自如與之遊為改今名真武洞在九子溪東真武廟側洞因廟得名水出其右即三獻水之一也其洞西向頗隘中有一潭不竭土人目為諸龍湫之首黑熊洞在落伽洞左崖下舊傳有黑熊居此法師所庵曾於此洞談法華經鳳眼洞在羅漢壁西來寺後絶壁上一崖外附東向成門前有橫石凌崖上跨中透小隙日光注焉洞不𥥆深而潔淨可居楊黼洞在羅漢壁西危崖下楊黼者大理人栖息於此二十年得道而去其始末詳人物志中重崖洞即白鹿洞在九重崖絶壁回𡶶返向青檀山上豎巨木崖間斧痕為級以升又躡石痕捫壁而上崖畔穹肰如飛簷上覆宴坐其中肆目南眺水目天花諸巒羅供有奔役之勢自非煙褰雨霽莫辨此遙岫矣麒麟洞在獅子林大力南宗二靜室左澗中即珠簾水飛注處金華洞在檀花箐西金華庵西北即𡶶頂西岡將盡處崖懸路絶層巒危聳與列岫爭竒人迹罕至有僧南松嘗止靜其間仙鶴洞在白雲寺補處庵右百餘步三石攢起上纍一小石有似鶴頂洞邊多産松菌靈芝諸異草華藏洞即大石洞在雞坪關後石洞村乃此山後嶺向北環轉處山至此伏而再起另闢洞天洞門宏厰高九丈濶七丈漸入漸高𥥆窕𨺚深石乳凝滴結而為笋高者如塔如柱又綴而為幡幢纓絡鬼工天巧名狀都絶兼有石臺石人石牀器獅象羊虎禽魚花樹羅列其中進至一處有石穹窿擊之吰肰如鍾又有稍𨺚起處其聲逄肰如鼓俗亦以石鍾石鼓呼之左右小洞曲穴不可枚數洞天之竒於斯極矣小桃源洞在小華首門之東以其石寬厰下臨絶壑山路險峭土人嘗避兵於此故名小石洞在大石洞東五里外窄中深秉炬而入門竅層疊竒探不盡中有深潭人傳有龍潛焉清窅冷寂遊者不能久留實茲山之幽異處也騰蛇洞騰蛇洞在後山東壁相傳有異書及法華經藏其中恆有毒蛇守之人或援藤而入多被跌傷故罕至焉又名藏經洞收蛇洞收蛇洞在小華首門西有石竅其深不知幾許古昔相傳有異人以咒術收蛇其中故此山蛇不傷人黃猿洞在悉檀寺前小瀑布下大士閣之東恆有猿猴蓄山果其中人往覔焉或得數斛泉經洞在洗心橋邊聖母水潭西二十步或歲水潦此洞出水則次年必旱農家每以為占卧虎洞在白石庵後紅蛇洞紅蛇洞在接待寺三家村西箐內五里許每秋前有小紅蛇出卧石上而不傷人嶽山洞在放光寺之下藏頭洞在華首門北岫側歷落嵾牙昔周哲於此洞修煉多藏經史道書人罕見之故名玄鹿洞在楞伽虎嘯二崖之間𢈏子春知空眼藏搜攬竒勝登小沈臺見藏頭庵北懸崖之上古木叢蔭處有玄鹿二呦鳴而出馴擾不驚如相迎之狀故名箐口洞在九重崖下塔院之北洞不甚大而林木茂密境界幽窅碧雲洞在幻空閣左崖半可坐五六人玄玄洞在鶴峋碑崖畔絶壁數十仞空洞臨危其𣵫廣莫測而無路可登自非飛鳥翱翔莫得窺其幽奧矣壺天洞在真武洞之上竅穴玲瓏廣一丈五尺有竒葩異卉翠竹碧羅擁蔭其門儼肰仙客棲真之洞天也小蓮房洞在千華崖之下怪石隱門人迹罕至蓋猿猱棲息之所大蓮房洞在小蓮房洞之上飛光洞在背光崖之西洞中可坐十餘人夏秋之際嘗有金光飛繞其處石室洞在獅子口之西弘厰幽邃中湧流泉丹霞洞在獅子林後山下十里許昔有僧習禪其中孤邃幽險不易居也一念洞在功德庵之左寬一丈三尺蟄龍洞在翔龍寺之西隔澗懸崖之上隱顯洞在袈裟石左上下二洞空怪相連棲真之士每神娛其間小華首門在華首門下層小𣑯源洞之右此處又下一層平出三崖中曰金猊左曰青獅右曰白象一名小華首門羚羊洞在回杖處之下老古洞在覺靈寺右嶺上昔有僧老古穴土為洞棲禪於此臺禮佛臺禮佛臺在束身峽西南𡶶頂三面絶壑南向木香坪後有伏虎庵前為玄關洞昔時古行之士恆於其上禮佛以致精虔李中溪愛其竒勝於此建賔蒼閣以其面對點蒼山宛肰天外屏畫也望臺望臺在獅子栴檀二林之間自橫亘大嶺分岡南下𨺚起一𡶶東界獅子林披林縈磴若穿翠幄登此始見𡶶頂西懸故以望臺名小阜聯突如貫珠墜指顧臺在點頭𡶶之下自九重崖達獅子林路經其處指顧合山庵寺如觀掌果歷歷分明阿難臺在華首門左面臨蒼洱妙高臺在玄關之右寬可二丈三尺小沈臺在藏頭庵前群𡶶拱抱疊嶂回環澗溪竹樹無不生情勢若雲霞擁月辭佛臺辭佛臺在白石崖東大路傍繇南山北轉為登山初境上有小塔凡入山禮佛者歸路至此回望山頂作禮辭佛以伸眷慕焉坡解脫坡在石鍾寺下大士閣上長可三里西望玉龍瀑登山必經之處蜜哆坡在積行庵傍水月庵上火雷坡在拈花寺右石蟇江外此山高一里長五里自煉洞西山頂分支東北向逆上倉湖之水為石蟇江與雞山諸溪之水合流而為煉洞河岡回龍岡在放光寺前從中𡶶斜分一嶺自東向西正對飛鳳嶺迤𨓦起伏長二里許熊羆岡在華嚴寺後此地原為熊羆窟穴先時有南京老僧真圓習靜於此熊羆漸隱遂建梵剎橫琴岡在古雪齋片雲居之前塔院之上垂巒平亘狀若橫琴振衣岡在文筆山之南絶壁百仞上有平岡俯視接待寺河子孔諸景了了可畫嶺飛鳳嶺即鷓鴣山也在放光寺西山形自古碑崖翔舞而下其長數里宛肰飛鳳御風嶺繇白井庵前下至會靈庵起伏延衮長五里許清溪交流長松掩映逰人經此有憑虛御風之想太極嶺在飛鳳嶺之右既圓且正形如太極四周諸𡶶簇起並秀爭竒恍肰媚靈於茲嶺也雙泉嶺在覺林寺右拂袖嶺一名蛇伏岡在西竺寺前自息隂軒左斜拖而下繇西而東至牟尼庵約一里許細瘦橫披如拂袖之狀石棋盤石在絶頂之西束身峽上文殊閣前南北兩崖夾墜而石懸其中平整如盤世傳昔有兩仙對奕於此原有三十二子於今亡矣升仙石在捨身崖東玉井峽之上高五六尺寬平可坐二三人俯臨絶壑上逼層霄登其上者矌肰遐覽俗慮頓空飄飄肰有羽化升仙之意華津石在四觀𡶶後休歇處之前寬二丈高三丈一片橫斜上可坐數十人石面浸出流泉注滴石下即滙而為三極泉眠獅石在栴檀林煙霞室右其石高一丈六尺廣九十圍層疊兩級可攀而升高下回凹處可坐十餘人石隙生大樹高七八丈修柯曳雲濃葉蔽日籠罩婆娑故堪玄賞子母石在大乘庵左其大石高一丈三尺廣可一百一十圍古意崚嶒有級可升上可坐三十人更左三十步有石差小亦偉俊可觀旁更有數石半露半藏僃極嶔崎之勢袈裟石在銅瓦殿有坡野卉蒙茸別具幽勝相傳當日尊者曬衣其上青石白斤其文縷縷領褶俱全宛肰袈裟鋪覆因名焉其上原有小閣為比丘棲禪之所玉屏石在簑衣庵舊址其石高一丈一尺濶七尺正面平削宛肰插屏下又有小石方正可作坐墩旁立古木一枝大八九圍高四丈許蒼肰掩覆勢頗相得獅頭石在迦葉殿西三十步高丈許大八九十圍前張吻如獅口生樹二枝掩映蔥倩培增竒致謝東山逰山記曰殿西數十武有盤陀石可坐十數人崖畔孤懸不可行而至考此山別有盤陀石在放光寺西此故名獅頭石謝公落筆偶誤耳謝即近時人慕晉謝安之為人故號東山其逰覽之興果堪追配晉人東山之號非浪稱也盤陀石盤陀石在放光寺西崖藏頭庵下石高一百二十尺直立如笋亭亭上擎雖附崖而起不與崖合挺肰離立架橋而度頂平可二十餘尺上搆小亭危聳特絶行僧大千嘗趺坐於此後當飛泉搖曳疊嶂縈流幽異孤渺別具靈秀逰者扶杖而登下臨絶地峯壑羅列故堪竒賞半落石在盤陀石左數十步其石附崖而生突兀欲墮下臨千尺之磎跏趺石在觀音崖下其上平正故堪結趺入定片雲石在獅子林純持靜室側高二丈寬丈許可坐二十餘人旁有流泉美冽甘潔移石在悉檀寺右坡石高一丈二尺廣四十圍此地舊為羅漢寺石原在寺內僧衆嫌之忽有人來云此石可移也可為我具食僧入厨治齋既出則石已移出寺外其人不知所往矣或云是潭中老龍特示靈異耳翠屏石在獅子林中一𡶶高聳四面如削芙蓉而金粉雜鋪彩文如繢上刻翠屏二字雲生石在獅子林𡶶頂其大數圍高二丈三尺傍有小石潭凡山中欲雨則此石傍必生濃雲如車蓋散布蒙密其雨即至金剛石在放光寺門內高一丈一尺寬可三十圍崢嶸兀突上建小亭名四無亭可容數客石腳有空凹處可以趺坐雲鶴石大石五六倚疊河子孔之上乃中溪李公所題放光石在勝𡶶寺前其石大小不等五色俱偹各具六稜可供清玩兜率石在彌勒院左兩石連生參倚作勢高五丈許頂寬平可坐數人紫苔交錯有如繡𦂶螺文石在慧燈庵右狀若螺紋牛首石在迦葉殿門外土地廟前狀如牛首俯瞰衆壑有老樹數枝盤根其上曲筧石在獅子林六般羅密靜室之下其石嶙峋當路靜室比丘引泉資汲者必經其石之腰苦於不能直度乃刳木為曲筧繞石而流故名念佛石在二天門上頂可趺坐朝山比丘修淨土者嘗於其上默坐念彌陀焉霹靂石在鉢龍室之後其石嵯峨兀突若不可犯石之上更有大石中開一隙若離若合險怪岈岠恍若雷轟傍有老樹怪藤特助竒古石頂正平躡級而登可坐數十人前後百步內大石二三十枚各具異勢其衝肰負土而上者若熊羆之登於山其嶔肰相纍而下者若牛羊之飲於川柳子厚所云未足當也砥石在白雲居前倒影池之右石高五丈廣三十圍頂平如砥上坐五六人伏虎石在白雲居左高八九尺長二丈許遙睇近觀周回審視宛肰蹲虎首尾高下無不勻似箕踞石在石鐘寺左平岡上大石數塊橫側異狀上有古樹數枝叢蔭周覆真可供幽人之箕踞矣笋石在念佛石上矗立如笋最為孤峭憑欄石在念佛石上形如欄檻下臨絶壑憑倚遙觀則蒼山如案洱水如巵仙人牀在華首門傍左右兩座對列其上寬平宛肰牀榻可供坐卧阿闍石在華首門崖右阿闍世王曾于此朝禮尊者故名魚頭石在放光寺右屏風崖下高七尺五寸尖唇外突恍若魚頭金鰲石在銅瓦殿右長數十丈昂首之勢儼若鰲山流雲石在無字碑下高五六尺廣丈許雙柱石在玄鹿洞左兩石連峙直立如柱龍樹石在龍華寺門左相去一百九十步其石正方高八尺周圍四丈三尺上生樹一枝大十二圍高五丈餘一根分作二枝其幹相抱葉復作二種有老藤蒙綴旁有小樹一枝高二丈其根皆蟠石而下入於土石之東南又有古樹五枝茂密隂森以助幽異拜佛石在伏虎庵前其石高丈許突臨虛崖登躋其上骨悚神栗嘗有行僧履而拜佛肰須一心朝向絶去瞻顧方能俯仰起伏若左右旁視即匍匐欲墜矣鬼工石在玄關之上大小數塊委疊相倚怪譎險側欲墜欲崩不可名狀無字碑大石二塊宛肰碑碣在羚羊洞之上知空眼藏探幽攬勝不辭危險無竒不搜行至此處小遇霧雨知不可登遂扶杖而回兩人以為勝遊之大缺陷也道友仙陀為題其地曰回杖處爛柯石在伏虎庵左棋枰石之側生公石在羅漢壁德上靜室之下大小數十塊或蹲或倚如拜如侍宛肰群聚點頭之狀小盤陀石有二在大盤陀石之左二百四十步旁有古樹三枝潄玉石在靜林居前路下高五尺其頂寬平坐五六人雙澗夾流清潄如玉謫星石在龍藏谷中放光寺前後大小數十塊竒形怪狀高者百尺小者丈餘或如正士危坐或如武夫肅衛或如竒鬼猛獸森肰欲搏人或如金翅劈空騰蛟戲海有飛舞奔躍之勢山石之竒目中未覩遊至此觀止矣嶧陽石又名天磨石在羅漢壁絶頂之上兩石相壘高數十尺最為竒險三笑石在石梁橋西北大石三塊相並𣣱倚雄偉突兀頗有嶲致老人石在黑熊洞左拔地矗起形如老翁水心石在嶽山洞西大澗中高十三丈廣倍之頂平如掌三多石在二殊室之下大石三塊相去各二十餘步上石高七八尺其根空而出泉狀若雲之倒垂中石高丈許突兀竒偉下石高二丈頂方且平可坐十餘人九品石在石梁橋東石甚竒𨺗有僧刻九品往生四字於其上故往來者遂呼為九品石峽束身峽束身峽在絶頂西文殊閣前兩崖對峙中分一徑僅容人身穿過徑中流石歷落擁足礙履行者倚側不能自持可二里許藏書峽在魯擺靜室之左仰高峽一名五十三參在迦葉殿北羅漢壁西即登𡶶頂大路轟巒突石𧇊蔽左右中徑若剜崖壁欲合行者視前以為路窮更轉更睇窅曲森險俯瞰林壑仰眺岑嶺一步一景倐忽互換雖屢遊者亦疑誤焉崖中吐三獻水足資行者之渴周直指建亭於斯今圮廢矣獅口峽在獅子口之下長四五里𨺗直險僻人罕繇焉梯雲峽在羅漢壁西來寺左高十五丈兩崖夾立窄如箭括通天無路可升靜室比丘每於峽上採薪從峽中擲下又從下拾之而歸蓋天險也玉井峽在捨身崖翠屏峯之間崖壁環匝宛然欲合形如玉井蛇立峽在羅漢壁安心處之右兩崖束身矗起一峽崚壁當面𨺗上干霄雖飛猿捷猱窮於登降矣巨靈峽在幻空靜室左從羅漢壁最𨺗處崖勢對裂狀如斧劈峽高十七八丈仰視崖頂炫目危心己亥兵亂山中比丘用十尋直木斧砍為級緣之而上然從之者鮮矣神足峽在獅子林大靜室左其峽寬而且深長五六里𨺗險異嘗非具神足者不能登也谷通天谷即束身峽絶頂西北下繇文殊閣至伏虎庵兩崖矗起中通一路二里有餘崖石嶔崎徑道盤折既窮復通幽邃無際蟠龍谷在華首門下放光寺前直連檀溪大壑箐檀花箐檀花箐即桃花箐此地原有大青檀樹一株故峯與溪皆以青檀名後其樹既伐土人遂誤檀為桃繇山頂西南七里許深林雜樹蒙翳幽窅莫測其高幾許南北穹巒中凹成坳東西則分溪㵼流逝湍各別東下成溪滙出洗心橋西流迸湧直繇和光橋而逝箐為賓鄧分界因去山稍遠遊者鮮及實則綿邈幽深逈絶塵境蜜蜂箐在太極嶺之左松花箐在萬松庵上連松二十餘里花開時人行其中衣袖俱沾松粉萬里箐在太極嶺之右此處樹木最為深密多藏劫盜行者苦之山神箐一名冷水箐在白石庵右芭蕉箐在南村後相傳此處舊有芭蕉四五里今無一存滄桑之變信不誣矣坪明歌坪今建為勝峯寺寺碑載迦葉入定八大明王送至此鳴歌作樂故名後人因而建寺羅漢坪在沙址西塔院崖下靈山一會坊內昔傳有羅漢現身於此木香坪在西南峯檀花箐東南與點蒼山對其坪在高山頂脊圍環寬二十里四傍皆深林密翳積雪不消而此坪獨寬坦溫煦甚宜花樹昔時服勤之僧多於此結廬習靜今荒蕪無復存矣洱西人士駕艇登山多繇此取道焉萬松坪在四觀峯之後繇絶頂西北下四十餘里皆合抱古松修柯曳雲濃蔭蔽日長風遠振濤籟幽長使陶弘景見之不知何如神往矣憩佛坪在大龍潭之前其地寬廣平厰樹石回映清泉交流俗傳古有五百羅漢遊憩於此窟金剛窟在華首門西二百步高八尺深丈餘中可坐臥六七人還源眼藏兩師避兵于此但崖路危仄人罕至焉窩獅子窩在獅子林後崖下面對東北廣三里長七里多産奇樹名卉舊有獅子庵今圮廢矣
