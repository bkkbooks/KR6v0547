body:
  text: 山水下水雞足山源泉噴流不下百十餘咸奔為大溪界山而下其南面諸溪水皆繇雪隂橋合河子孔水東折過拈花寺前蹲象山北麓合石蟇江水又東南流會觀音箐及賓居大王廟龍泉諸水同歸大羅河北行過達旦哨入金沙江金沙之下流即孔明征孟獲所渡之瀘水也此水東北流注馬湖入川江歸東海又山北面諸溪水出和光橋合佛光寨羅川水亦出金沙江惟西南山外諸溪水則流入西洱海繇大理玉龍關西流至合江鋪會漾濞河水南折西合瀾滄江水又西南流繇順寧景東沅江交址竟出南海瀾滄江即黑水也尚書云黑水西河惟雍州華陽黑水惟梁州其源出南吐蕃鹿石山本名鹿滄江後訛為瀾滄今人以瀾滄衛近金沙江遂呼金沙為瀾滄而又訛瀾滄為浪滄矣天下之水皆東流入東海惟雲南瀾滄水西南流入於南海嘗疑滇中必有山勢𨺼起界劃東西之處今窮考雞足一山之水其支流滙歸遂分金沙江西洱海兩處肰金沙洱海相去不過二百餘里而兩水之歸一東北流向東海一西南流向南海則滇中地脈界劃東西二流之處實在於此可知雞足一山繇西域雪山而來發脈崑崙自西北而行東南地勢獨𨺼為東西最高處故一山之水東西分赴關係地脈政匪輕也因附若水黑水兩江之考於後以俟博學者論定焉按金沙江原名若水考之水經若水出蜀郡旄牛徼外東南至故關又考旄牛徼在麗江西北吐番雍州界崑崙之東南即佛經所謂四獸口中流出者是也山海經曰南海之內黑水之間有木名若木若水出焉酈道元水經注曰若水南經雲南郡之遂久縣即今金沙江北岸巡檢司地是也此水出吐番經雪山之北過麗江經雞足北合繩水孫水瀘水大渡水諸水沿注通為一津即若水也東流注馬湖江諸葛征南曾渡此水又金沙江有二在緬甸者流而南出麗江者流而北人多混混故樊綽又以麗水為黑水也按瀾滄江即黑水也此水自麗江雪山之西經雲龍州東南流入蒙化順寧景東沅江交址乃入南海酈道元水經注漢武帝時通博南山道渡瀾津行者苦之歌曰漢德廣開不賓渡博南越蘭津渡瀾滄為他人即此水也黑水之説本於禹貢從來辨論紛紛終無確據以酈道元注水經鋭意尋討亦不能知黑水所經之處地志以為至僰道入江其言與禹貢不合孔鄭諸儒考究不得蔡氏作傳引地志出犍為郡南廣縣汾關山水經出張掖笄山南至燉煌過三危山南流入於南海樊綽以西南彝水南流入於南海者有四曰麗水即黑水也酈道元又以葉榆水西南流而水以榆葉所清其色深黑遂欲以當黑水肰葉榆水出浪穹縣罷谷山止在大理境內遂入南海若尚書雍梁之界皆曰黑水則黑水當自雍之西北以經於梁之南豈葉榆可當惟瀾滄之水源出吐番嵯和哥自西而南經雪山西至麗江蘭州入雲龍州南過永昌又南過車里大甸入於南海為是但甘肅志載甘州西十里有黑河流入居延海肅州西北有黑水東流荒遠莫窮所之是其源出雍州西北而流入梁州之西南其正西則流繞西極之外而不可窮蓋地勢西北最高故水徑西而西南也總之禹貢曰黑水西河惟雍州華陽黑水惟梁州又曰禹道黑水至於三危入於南海夫隴蜀無入南海之水惟滇之瀾滄潞江二水皆繇吐番西北來與雍州相連並入南海但潞江西南流竟趨緬中與梁州不相陟惟瀾滄繇西北而南至交趾入於南海水內皆漢水外皆彝則禹之所導分別梁州界者其為瀾滄江無疑也地理志謂南中山曰昆彌水曰雒山海經曰洱水西流入於雒故瀾滄江又名雒水言脈絡分明也梁雍之間黑水非一肰皆枝水而流不入南海如孔明箋所謂朝發南鄭暮宿黑水之類皆非也雲南為西域之地前朝雖通中國封號羈縻而已至宋竟與中國絶故漢宋諸儒考辨黑水終不得其要領余自己亥避兵蒙化親見洱水西流合瀾滄及𢈏子春纂修山志考雞山水勢半出金沙東流歸東海半入洱水西流入南海始知雞足一山水分兩𣲖則此山為滇之岡脊地脈遙遠其與他山偏在一方逈不同矣因博考方輿載志諸書及詳問土人故老為著若水黑水之辨以見雞足之地勢其來脈高遠關係匪輕可知迦葉祖師之入定此山亦自有因緣未可草草視也三獻水三獻水在仰高峽中一出滴雪崖下一出兜率庵左石洞下一出真武洞右危崖萬仞怪石崚峋絶壁懸空傍無宿土而洪泉爭湧聮絡奔會汲資千鈢溉澍百區世傳迦葉尊者敕七十二龍擁護此山故飛泉灌灑無𡶶不潤雖孤崖峭壁亦注懸泉迄今梵剎星布佛會佳辰香客遊人時盈數萬香積筧水鉢瓢滌濯率皆霑注盈足未嘗纍汲也曹溪水出懸崖下在八功德水西湧注不息宋直指建庵崖間題曰曹溪精舍今屋宇傾圮惟故址存焉八功德水一名八德溪在曹溪水華首門之間飛崖二臨迸石而出滇志云迦葉尊者於石上卓錫成泉故涓流不竭珠簾水珠簾水一名萬珠簾又名四諦泉在獅子林中觀音崖之東隅翠屏石南崖危石矗起上突下嵌崖上多竹樹雜卉水從樹根石隙亂流而下崖窟若廊若榻而懸流虛羃其外展氷綃於林杪挂珠箔於雲端濺注霏微令人遜目怡心不能自絶於其際河子孔水一名聖母泉在雪陰橋南上有大石橫偃空如張吻濶一丈六尺高可半尋左右復有石數塊名雲鶴石大小差等撑拒支亙勢甚危險諸亂石下衆水奔湧廽注斜射與山中諸水相滙竒發齊瀉東注大澗夏秋澍雨後溪水皆濁而孔水獨澄淨如故雖與諸水合流而清濁不雜世傳此水自大理西洱海透山而來故水獨別再詰其故則云昔時有人朝山在西洱海邊午餐所攜食盒落水流去其人既至山下小憩此水之傍則見原盒繇此孔中流出以為神異知其地脈潛通於時俗呼此為盒子孔後蒙氏得國建號大理乃封其水為河子孔蓋西洱海故名洱河也三道水一道水在金華庵下三里許其源出白鹿寺之西繇一道水西去半里餘即二道水也其水發源威音寺之傍繇西而北合一道水併入於三道水三道水之源發自木香坪後流出大聖寺之下自南而北從翔龍寺之右循崖而下三水滙合併注一溪清流激湍奔瀉數里總繇松鶴橋下又合和光橋水出羅川河入於金沙江溪九子龍王溪在迦葉殿東五十步此溪源最高水最湧合三獻諸水而下注於栴檀諸溪鳴琴溪在白雲寺補處庵二剎之東栴檀溪在寂光寺左深窅回曲樹石籠映衆水奔赴湍浪激蕩上有大橋名曰響雪花石溪在幻住庵蘭陀寺之中溪不甚大而回曲清𤃒樹石蒙繞實為幽僻檀花溪在木香坪檀花箐中此地舊有大青檀樹可數十圍遠近瞻異故此𡶶名青檀顧虎𡶶黃沙溪在華嚴寺前窈窕層折竹樹茂密衝濤嚙石聲亂鐘板上橫巨橋題曰德水倚杖溪在大乘庵之左上有逍遙橋大錯和尚嘗獨行至此倚杖聽流水聲移時忘歸故有斯稱赤蕨溪在山後西北金華庵大聖寺翔龍寺諸剎之中澗虎跳澗虎跳澗即四觀𡶶西折下山處兩傍峭石突起倚崖並蹲各具咆哮之勢相去丈許下臨深澗按滇志馴虎澗在雞足山兩崖峙立霞圍霰集昔迦葉馴虎之處相傳有二虎出入故此地有伏虎庵集流澗在傳衣寺傍衆流滙集高下𣣱折乍大乍細疊注支流滙而為瀑秋濤澗在山南河子孔邊上有雪隂橋此澗滙山南諸水合河子孔泉東折南出過拈花寺前出石蟇江雙水澗在九重崖後雨水交流險峻層折葫蘆澗在大龍潭下繇龍潭下至水露庵崖石攢空卉竹蒙雜澗勢阻險溪路幽折石鐘澗在接待寺之左萬水奔赴樹石窅𡨋猿棲鳥呼行者感動壑龍吟壑在盤陀石之右崖壁天險剖為大壑人迹罕經吞天壑俗名大箐在中𡶶右𡶶之間長數十里寬四五里衆水奔流長風振樹實具吞天之勢即大覺寺山莊也騰蛟壑在猴子洞左幽折險峻故為龍蛇之窟瀑玉龍瀑在牟尼庵西其源自仰高峽來會華嚴諸流下奔而峽中有巨崖水自崖上飛流如崩濤舞雪遊人從解脫坡對壑而觀真有玉龍走潭之勢蓋當登山之始層𡶶冠雲殊壑擁翠而松崖蘿壁之間飛流潄玉響答鐘磬竒秀森靈實厭衆目栴林瀑在玉霖軒左崖橫斜下注激湧作勢上更有東西兩瀑尤為佳勝自崖面臨空平鋪旁無所撓前無所障牽曳煙風搖蕩林影遙睇旁睨各具勝趣軟瀑在小華首洞西其源自八功德水流下疊書崖東峽瀑在魯擺靜室下猴子洞東其源自曹溪水來東從藏頭庵下湊泊縈旋曳霧搴煙噴嗽變幻蓋當兩崖回合之中又極上嵌下削之勢所謂落銀河於九天控珠簾於雙闕未足形其勝槩也蒼龍瀑在體一橋上源自悉檀寺前大龍潭渡伏龍橋滙諸細流而成曳練垂珠濺石作態潭大龍潭大龍潭一名烏龍潭原名軟石香芹溪在悉檀寺前昔時水深林翳隂森寒悚樵採者不敢斧斤其旁或有犯者即風雷驟至蓋有黑龍窟其中也自潭上建悉檀寺林間淵碧素流澄鮮靈物似亦有歸依之意肰山中夏秋霖雨必有濃雲自此潭興升至山巔即風雷交作傾瀉如注僧衆每以此為占其細霖微霑即不肰矣或云當悉檀寺未建此潭水湧如潮晝夜崩騰建寺時僧釋禪著衣杖錫作文祝之龍遂移赤石崖每夏秋之交一歸此潭來則風雷震蕩飛沙偃木合山僧衆皆知為龍歸也舊傳迦葉入定有七十二龍來護此山事雖難稽肰此山之龍雖多而絶無橫潦崩突之害則佛法無邊天龍馴伏固有肰也小龍潭小龍潭一名柳枝泉在悉檀寺後岡上五華庵前晶碧一泓杞柳樵竹叢茸雜映清流遠引澄泛無際石洞上潭在後山華藏洞左側一里許潭上有大椿樹二株大數十圍潭北有龍王廟祈禱者嘗見有龍作小蛇遊於潭中青紅五色隨時易形土人崇敬不敢輕褻石洞下潭從上潭南行二里即下潭水出亂石下迸湧作聲噌吰可聽潭上雜樹交映希見曦景激湍奔流三十餘步又滙為小潭清深可掬小石洞潭在山後嶺下小石洞中泉金雞泉金雞泉即眼藥水也在華首門東按李逸民遊山記曰金雞泉僅一碗水日有異鳥飲之其來必雙至二十雙而止四時皆肰鳥無增減水亦無盈涸有僧倚崖搆閣汲此水以供香積夢神語曰此是金雞泉爾不宜溷擾越日閣災太極泉在飛鳳嶺之右碧雲泉在碧雲寺左峽其水自石間出其味甘冽緇素資之陰陽泉一在雙泉嶺南一在嶺北南陽北陰嶺亦以是名也一泓泉在𨺚祥寺之左清潔香美逾於他水清涼泉在無住庵左側石漏石漏即白雲泉在念佛堂後青壁千仞雜樹倒垂傍突一石支崖凌虛上實下虛宛若懸鐘水自石腹中散綴而下不見泉脈飛珠噴霰如刻漏之垂注余故改題為石漏聞萬曆間有僧白雲結廬崖畔禮誦華嚴精勤不息感石竅灌滴下注涓涓不絶其石高三尺濶如之高處中空漸上漸隘水從空頂中墜下為方池一泓四旁皆崩崖巉石𣣱曲倚側乃水不溢於坎而溢於脊不溢於脊之外崩而溢於脊之中管管中之液又不溢於旁伏而溢於中垂其靈異如此至九重崖東石縫迸瀝分級而下列為三𣲖各懸注丈餘資給諸廬甚為甘冽天乙泉在清涼泉右隆祥寺所引即此水也環侍泉在圓覺庵左右兩泉並侍水脈潛通濕雲泉在會雲庵之右峽下萬佛泉在羅漢壁太華靜室內削崖危聳如刺空劈雲而崖下剜潭廣可五尺深亦如之半入崖根半露崖外澄肰不竭始僧廣傳持誦法華如此咒鉢迎八功德水傾注坎中水僅盈勺資給未廣後太華更加開鑿遂成淵泉三沸泉在獅子林下有泉三孔湧出如沸雲湧泉水出法雲室之左瑩潔騰湧不啻白雲出洞青龍泉在華嚴寺左腋去寺里許暗香泉在聚仙崖之下泉上有古梅一株踈影橫斜堪入圖畫望臺泉望臺有泉自嶺脊瀝石而下東會獅子林水同發齊瀉涓湧不息栴檀比丘引流資引多於崖端架木曲折橫斜度岫穿𡶶以代運汲初地泉在接待寺之左三極泉在山頂後岡去羅城二里許泉有三孔湧出作品字形上有屋三楹榜曰休歇處山頂比丘咸汲此水以資佛供湧蓮泉在放光寺前七十餘步其泉周圍多産木蓮花木香泉在青檀山東北峽中女燈泉在慧燈庵左菜圃之上水從橫石中泄出雖遇久旱而此泉盈注如常潛龍泉在片雲居左嶺下每天將雨則泉中雲起飲馬泉在撒馬場西南下山路左峽潔泉在沙址女僧繼周庵中捉月泉流自猴子洞側出於削壁絶壑之間其源不可窮也琉璃泉在碧雲寺路旁去觀徹靜室百餘步水從三大石中沁出浣石泉在獅子林二殊比丘石彈軒之西水從大石下湧出伽音泉在獅子林頂相靜室左澗中危石之下湧泉出自獅子林支秋廣傍流灌栴檀林諸修靜之士咸資汲焉四歌泉在獅子林下林泉靜室左邊石孔流出及天香師所鑿金龍泉在蘭陀寺內佛殿後相傳昔有金龍潛伏於此天乳泉在幻住庵前東澗中泉水清瑩浮花泛彩故名天乳白露泉在蘭陀寺門首離寺一百八十步香樟泉在止止庵舊址醉象泉流自九重崖東石窟中去道本靜室三十步從一衲軒流過箭括泉在蕉鹿崖下即本懷禪師書華嚴經處金剛泉在九重崖河南大定禪師住靜處其水逆流自東至西二百步許下泄過法易禪師靜室分筧支引太小繇射鼓泉在九重崖西從大石孔中流出去醉象泉數十步碧紺泉其泉自靜居林左澗流出去靜室六十步水作青碧色逈異他泉崩雪泉在明歌坪左澗中鸚鵡泉水出凌霄庵左澗中去庵三百步摩羅泉在補處庵左鳴琴溪中水從三大石中流出石鹿泉在補處庵前水自二大石下流出其石蹲立作勢有似鹿之飲川也樹手泉流自法明寺左澗中去寺半里許盤龍泉在法明寺門首水從盤龍庵故址下流出獅尾泉水自首傳寺右深箐中流出下注止水靜室左澗中四論泉自首傳寺右澗中出去寺四十步水蓮泉在寂光寺後麓左澗有小山突起復凹如缺水自此中出離寺半里許弄珠泉從大覺寺左澗浸流相去一里分注過白花山潮音閣鐵骨泉自慶雲庵後麓流出此水注瀉甚長資給廣遠緇素汲引前後不輟五雲泉從慶雲庵路旁瀉出流過龍華寺蓮鬚泉在龍華寺右澗中泄出筆花泉在西竺寺門外其池形如半月寺門內原有舊泉久而漸湮此即舊泉所注也鵝眼泉水自淨覺庵後小澗中無節樹下流出去寺七丈許雨香泉在大乘庵左側大石下流出青鳥泉青鳥泉出法界庵溪邊下泄無我庵去庵一百六十尺染泉出自龍泉庵後麓流至庵左其水與土相漬染布作色甚冝緇流山中賴之停雲泉此水自白雲居石窟流出內外兩池方廣略等大約可八九丈涓流甚湧晝夜不舍蘭若汲溉之外猶復下注溪潭歸納江海點雪泉自古雪齋左崖下流出西滙黑龍潭水泄為懸瀑莊嚴泉出自悉檀寺藏經閣東去閣半里許浴塔泉浴塔泉出西顧山東嶺飛流泄雲傾濤濺雪尊勝塔院僧體極治瓦為筒自西顧山南麓引渡文筆山北岡兩山對峙各處高阜中夾成溝自卑而升下注上迸逆流不息滙而為池畜魚資汲巧具神工不啻禹鑿𢈏子年其徒妙濟復易瓦以銅引入院內另鑿方池中搆小亭池水平繞儼肰蓬島之勝羇逰宦子莫不留連信宿用相娛慰菩提泉從菩提場右澗泄出般若泉一名靈湫水出般若庵溪左湧雷泉出雷音寺前路旁相去百步許嵐影泉從慈雲庵後溪瀉出下注開化庵溪中多産榛栗萬松泉在菩提場上出古樹根下問津泉出白石庵卧虎洞前去洞九十步其水湧出路旁旱潦無異天女泉出木香坪此處多産天女花花似玉蘭而微小其香勝之山中比丘移植庵寺春初盛開色淨香清堪冝佛供天眼泉在玄雪𡶶西南隅去伏虎庵二里許鹿野泉在白鹿寺西嶺之麓此處為賔鄧二州交界去大路百步許碧落泉一名雙林泉在翔龍寺左澗兩大樹中亂石離離清流迸湧雙樹交映故又因以著名天隱泉在翔龍寺後山岡回復林樹蒙翳雖久居者未能探其源脈也藥叉泉在覺林寺傍去寺半里許清碧泉在無聲吼之右從大石間流出鼻𡶶舍雪岸居諸比丘咸引之以寬負汲慈雲泉在八角庵菜圃之下雲友泉在淨雲庵門外澗中浣衣泉水出傳衣寺右腋讓泉讓泉原在開化庵內有龍居焉人不敢犯後建開化庵龍移居庵門外僧衆賴之泉之得名繇是矣蓮子泉在九蓮寺之右受記泉在華首門右與眼藥水相對古傳為迦葉尊者授記僧處玉井泉在絶頂之北去羅城三里噴珠泉在羅城正北下山五里許有崖數丈斜挂飛泉形如噴珠一滴泉在龍吟壑中繇放光寺右流過一葉泉在放光寺葉子蓬之前穿石泉水出嶽山洞前回龍泉出回龍岡下浴鳳泉在飛鳳嶺之上潮音泉出飛鳳嶺下其聲洶洶如海潮之奔湧池抱月池在傳衣寺北坡側寺僧德華所開山勢間曠崖影遙連平𤃒雲麓倒漾翠微周圍環以小垣不礙山色傍搆一小室挹茲光影致堪清玩洗硯池在寶蓮庵內擔當把茅師徒居菴內俱好畫恆於此池洗硯道㕛德音為題是名軟碧池在大覺寺門內方池甃磚周圍九丈畜金魚數百尾荇藻交橫翠微掩映澄碧蕩漾橫橋而渡憑欄嘯詠足澄心懷半月池在水月庵前形如偃月錦蓮池在悉檀寺門外昔年蓮花盈沼花皆錦邊故名秋月池在白雲居門內池面方平周以青磚上橫板橋泉從其中湧出水色清映獨勝他池蘋藻鮮澄竟池涵碧俯視遊魚恍若乘空倒影池在白雲居門外空淨明瑩緑卉叢生雞山峯頂影倒此池良亦地脈相依不止波光澄潔也照花池在拈花寺門內離離漾碧恍若映花雲涌池在雲海庵前二百步許每山中欲雨則雲從池出故庵與池皆因此得名燈明池在肰燈寺外春草池在龍泉庵門外水色鮮澄芳卉叢映恍入謝公詩夢矣寶華池在華嚴寺之左青龍橋下煙水池在德水橋上數息池在息隂軒之前天水池在西竺寺門外此池原在本寺大門內有龍潛焉建寺後住僧祝之遂移門外坎下塘茨菰塘在檀溪嵟下廣可數畝有流泉湧出其中湖上倉湖在雞足山之南周回十里中出嘉魚有丙穴之稱焉其傍産蓮花菜味甚鮮美土人珍之
