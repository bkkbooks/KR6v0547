body:
  text: 人物野史氏曰於戱地由人重豈不然哉滇南古屬西域崇尚釋氏其來久矣至文章禮樂之教則開自司馬相如宋祖玉斧一畫復淪於侏𠌯者數百年故滇中人物自明以前概難稽核士生斯地其亦不幸也夫今考之輿志徵之野史以及故老傳聞擇其可紀者著之若夫耳目傳疑者則姑闕焉孔子曰多聞闕疑誠不敢屈筆以誣斯民也志人物禪僧唐古和尚鷄足古和尚不知何許人也名小澄俗呼為小沈與二僧同住一庵入城吃食南詔問識何法門小澄荅云我能使死者生極樂世界南詔遂令國中但有死者請小澄起棺如此十餘年有讒于南詔者曰小澄妄人也云能超度死䰟何所證驗臣願入棺試之南詔如其言請小澄起棺將至化骨處起棺葢視之誠死矣懇之求生小澄又作法遂甦死者悔曰我已生七寶宮殿中如何復來此小澄遂還舊庵見二僧問食二僧曰汝從城中來乃不褁糧𨚫至此索食耶小澄遂走叩華首石門門訇然中開二僧追呼至石門則石門閉矣二僧悔恨焚身門外焚處生栢二株有泣淚泉存焉或云小澄即迦葉化身也見曹溪一滴宋慈濟不知何許人嘗在洱海東北青巔山峻石上禮迦葉日課百拜人名其石為禮拜石下臨不測之淵濟後立化於石今無有躡其石者出滇志元源空威楚人三歲能誦佛號入微溪山為僧嘗遊螺髻山有虎伏崖下後入九重崖絕粒經月一日端坐而化茶毘之處祥雲羃焉普通禪師號德存趙州人也幼入鷄足山出家遍歷講席因問中峯和尚于三乘十二分教明得與祖意是同是別峯曰你舉教意來看師曰擬舉即差峯曰恁麼則你講的經聻師擬議峯便喝師不覺汗下因茲服膺峯為升座示法語有叅玄上上人須識巧方便之句後結庵山中一日聞僧云水自石邊流出冷風從花裡過來香遂開悟嗣中峯本見曹溪一滴本源河南人至正年間來山開羅漢寺在大龍潭上明宗璵禪師號商巖得法于玄鑑初住鷄山為土官高鳳請于姚安創活佛寺與總鎮繼軒沐公為方外交題師殿額曰真如境界贈詩曰諸𡚶已消除一真獨自如舒之彌大千捲之無欠餘境界亦何有湛然靈以虛心境兩相忘寥寥徧幽居後諸方學人雲集座下者七百餘人送圓炤香周禪人偈云正是叢林搖落時出門相送步遲遲明朝玉案山中寺逢着仙人莫看棋見曹溪一滴淨月聖峯寺開山僧也弘治年間人俗姓胡曲靖世閫之弟年十九棄俗日食一飡積久道重人以白齋呼之遂歷湖海印證末旋滇入鷄足山先憇峯頂後於明歌坪建寺掘地得碑有迦葉入定八大明王歌頌相送之說遂營緝成寺見寺碑實庵大理人長身修髯始居淨土山後入鷄足歷九載每入廛市嘗依祠廟置瓢神案託食於神人輙以食食之如神後至白崖忽一日謂眾明日䖝蝗寺示寂扶掖至塔所趺坐說偈曰吾三十年寂而常照照而常寂效此修得吾啖飲也奄然順化茶毘之次忽瞠目曰大衲與舉火者此中有藥當分遂寂性玄號大機圓信庵開山僧也俗賓川人姓趙生於弘治壬子初入鷄足山接待寺披剃師体貌頎然存心仁厚嘗應禪期累居首座後剏圓信庵諸山俱服其德于嘉靖癸亥年無疾而逝圓惺放光寺開山僧也陝西甘州人年十六出家伏牛山後歷峨五臺遍叅知識于嘉靖間至鷄足山見華首勝蹟誓建寺于下李中谿遊山相遇遂為興創焉惺道行孤高三十餘年為僧俗所歸本帖號定堂尋甸楊氏子嘉靖禮搖鈴山白齋和尚叅萬法歸一有省後住鷄足山金龍潭屢見金龍出現又見本寺椒樹放光故初創庵名花椒庵後方改寂光寺師化時書偈云幾囘力盡心圓處坐脫娘生鐵面皮端坐而逝載曹溪一滴如正老廣西者鷄足山老僧也名如正廣西桂林人俗姓周萬曆丙子來止鷄足人以老廣西呼之住山四十年棲隱艸庵或趺坐空心樹下在庵則捆屨蒔菜以自供或遺之錢即遺寺主以為供餽齋粮之佐凡經行處鳥不亂羣獸不亂行後趺坐而化粤東羲印禪師銘其塔曰師之生年花甲四百七十有零師之僧臘水邊林下七七餘齡木人花鳥蘗苦氷清雪衲補處密行圓明翻然示寂空花死生形影不弔聲响分明筆頭隻眼舎利歸寧窣堵坡前山色青青明明千秋月炤西陵僧普荷題像贊云嘗聞老廣西是個金剛漢子今日見你拜你不過是個骨柮子謂是行僧便歇不下你擔子謂是禪僧又摸不着你鼻子帶來底是敲破了半個魚子打坐處是一科將死未死空心樹子這便是你留與後代兒孫底榜樣子請看這駝子這𡐊子咦只恐還不是你真圓號月潭鷄足山華嚴寺開山住持也嘉靖初自南京來卓錫於此故人以南京庵呼之後弘為寺李逸民曰真圓有戒德其徒皆率教一山所不及也匾囷和尚不知何許人居百接橋東土龕日惟種圃夜則跏趺嘗以艸席為囷趺坐其中囷形稍匾故人呼為匾囷和尚人傳師持𦂳那羅王神咒時有剏賊之擾殊不介意後擾之甚師笑曰何乃如是遂黙坐持咒是夜盜數人旋繞囷旁至曉迷謬不得去盜叩頭求釋師以手揮之乃去鼓山嘗有妖夜出人不敢行師以咒制之妖遂息山中僧眾𥪡降妖坊于法華庵旁今故址尚存圓清鷄足山僧嘉靖初結庵袈裟石上孤標峻潔李中谿遊山記稱為一山高僧之首天心名道裕聖峯寺淨月徒也幼出家行腳至南海普陀山得定三日一時名德莫不欽之道行清玄聲稱遠播後歸鷄山李中谿與之為方外交耆年無疾端坐而化太空名興徹洱海人初師鷄足定堂誓立禪永不坐臥後往孤島寺叅天竺和尚竺與師鉢烙餅連燔六枚一一被訶跪請曰某素為鄙業所食不佳願賜指示竺曰示汝耳繼又入蕩山學楞嚴于印光禪師每定三日光訊曰得法喜乎曰然自是翹一足立無欹斜住獅子山一日向眾為別語香煙盡我則去矣迨香煙既盡聞空中佛聲漸向西而逝法光亦定堂法嗣賦性孤高不隨世緣住山遇虎白額掉尾而來見之輙伏年八十餘而終悟月號古鏡白崖人自幼于龍華寺出家後歷諸方叅究心地囘結茅于寂光寺名古鏡庵一日師補衲有僧來叅繞師三匝師將衲擲地示之僧便禮拜壽至九十六而終如堂寂光寺僧澂江楊氏子年十五詣千佛閣出家從定堂得三昧法棲金龍庵六載因山無藏經入都叩請羅近溪遂為請送寂光寺師奉藏歸結幻住庵居之後坐化周堂號雪庭趙州人俗姓張髫年習儒一日閱般若經慕釋氏學遂出家徧叅知識後謁龍華寺佛心師曰某甲初進乞垂開示佛曰近前來為汝說師拂袖而去佛深契之後剏潮音閣壽九十有五德住寶山德住禪師聖峯寺僧劒陽人俗姓張嘉靖辛亥於聖峯披剃後依蔡關主究心宗學脇不至席一日歷伏牛山欲入堂眾哂為滇人足軟師遂翹一足立七晝夜眾皆驚服呼師為鐵腳羅漢名振遐邇還滇隱居幻住庵聖峯遇災師與妙峯重恢建焉真語黙庵禪師賓川李氏子生而喜佛事嘉靖癸丑投師正宗創止止庵師初不識文字日夜禮華嚴不斷經六七載頓開慧性誦華嚴如夙記遂叅匾囷和尚中谿公請師三塔開堂後建徧炤寺于白崖建般若寺萬松庵于洱海著有觀無量壽佛經註國母遣妙峯賫藏入山賜師紫衣年至七十有五坐化分靈骨於雷音萬松二處建塔焉如唐西來寺開山僧也關中人結茅于羅漢壁崖下日禮法華既久泉自崖根湧出每齋罷以手擎飯念佛一聲羣鳥集肩而食修銅瓦殿下大路十七里登山者便之明鑑號無臺大理郡守李華之孫年十八投聖峯寺白齋披剃後隱波羅崖艸衣水食嘗七日㤀飡又叅定堂接天二禪宗中溪贈詩云貝葉翻三藏曇花作一燈又送師歸淨雲舊隱贈詩云袖雲一旦別蘿月幾時圓後中溪請師白鷗社同居三年至萬曆十五年九月九日沐浴端坐焚香命眾誦準提千遍誦畢而逝及茶毘室有異香儒全號水月昆明人萬曆初年禮古林為師後與朗目同叅遍歷大方海內宗匠無不印可一日至峨山四會亭得璢璃三昧後歸主寂光寺朗目寄詩云鷄山古寺初逢處楚國長途復遇時三十六年成久別而今題作一聯詩又華首峯頭大寂禪煙霞養得慧身堅有時坐到忘言處迦葉重來展笑顏天台兵憲王公問師日用事如何師荅曰鑿池不待月池成月自來本安號無心大覺寺開山和尚也承天人俗姓舒幼隨母至燕不茹葷遂辭母祝髮法海寺年十六受戒大闡宗教萬曆己丑慈宮頒藏鷄山賜紫衣與妙峯同賫至山奉藏華嚴師駐錫大覺一山無不宗仰如滿號月輪華嚴寺月潭法嗣馬龍人姓易年十八祝髮即謂萬行為菩提初基雲遊至燕演習經論二十六載請藏來山兩賜紫衣圓頂與妙峯同賫藏囘山重修華嚴寺可全號徧周大覺寺僧也鶴慶李氏子年十六入山依月輪值妙峯無心二師捧藏來山議安華嚴寺由是開閱藏制塲百期于眾中選師披剃侍無心老人既妙峯復命而無心老人居大覺師隨侍數年感雲邑楊公後成大覺法席即隆門下百人如徹庸輩咸其孫也幻空幻空和尚北京人初入山住大覺前樓次住迦葉殿崖上又住羅漢壁石崖邊大樹下後諸方宗仰遂剏碧雲寺師居山四十餘年惟以叅禪為宗有來問法者但隨機接人時有直指姜思𧇩慕師道德入山訪師見師真掛壁師坐龕中即云和尚和尚業障業障既在龕中又在紙上此處為真彼處為妄彼處為真此處為妄速道速道免喫吾棒師從龕中荅云業障業障不止和尚赤條床頭冠裳輿上這也不真那也不妄真則俱真妄則俱妄如此是說請收尊棒姜公改容禮之遂為建寺勒碣云南嵩不知何許人依印光出家習頭陀苦行檀花箐素為盜藪師獨結茆于路傍晝夜經行三十年盜賊感化餽以香供本鄉善士請為建剎師拈香祝曰若此當興佛事請示靈異祝罷金光炤徹山原半日因建金華庵師後于庵之東石洞中禮佛十三年繇是大聖翔龍等九寺因金華之靈異遂繼剏焉臨終師命門人具齋邀諸檀越沐浴趺坐盆中而逝茶毘之次覺有異香清虛禪師曲靖人稚年入山禮月輪祝髮乃遊歷諸方叅訪明哲頓悟心宗後結社廬山四方衲子雲集座下千餘眾後不知所終真澄所庵真澄法師尋甸張氏子年十五企仰玉龍庵發光師一日菓園摘柿為獻忽墮地昏昏如夢中赴發光座下光曰汝事辦否師曰已辦及甦五體猶仆墮處遂悟生死不在色身乃禮光受五戒年十八叅古梅曲江梅告以遍遊天下遂歷叅諸師至千佛寺禮徧融和尚受法後乃來往五臺鷄足弘演教乘為近代法師之冠建那蘭陀寺於鷄足之金龍潭寂觀號法界傳衣寺僧也大理人俗姓陳于萬曆間出家後歷諸方至燕叅徧融和尚歸滇至響水關值虎虎避囘山主傳衣延所庵開講後寺災師恢剏焉慧光朗目慧光禪師曲靖人姓李曾住鷄足寂光寺後遊海內登天目蘭風之堂風以見佛了生死為問每擬議風輙呵一日風肩柴次遙見師擲柴于地曰見佛了生死師不言直肩柴去曰見佛了生死風深契之後神宗李太后召開堂于北京蘆溝橋復興安慶浮山刻九帶集囙與眾說楞嚴至同分別業二種妄見處忽下座告眾曰緣盡矣跏趺而逝塔于浮山有法句行世釋禪號本無昆明張氏子博學有道行初憲副馮時可擇鷄足勝處建息陰軒居之後麗江土知府木增復延建悉檀寺并開牟尼山所著有風響集老子註二卷及楞嚴懴禪宗頌古俱行世澹虛法名廣融葉榆人俗名李應霖中鄉榜萬曆年任知州棄家祝髮于寂光禮水月為師建三益樓清凉閣儒施號大力宜良人所庵法裔初入山時四林茂密人跡罕到是時山中無住靜者剏建靜室從師始師素履朴直舉止有古人風初修苦行後叅禪專以淨土接引後學年近六旬夢生西方現一池中皆大蓮花花上皆坐偉人自身亦與焉示寂時合掌西向廣慧禪師號野愚雲南嵩明人法嗣水月行腳江南數十年歸來著有頌古百則漚花集一卷行世逝於昆明化時獲舎利數十粒手骨赤如珊瑚聚洲王太史以師禮之臨終偈云一句元無踏倒太初非凡非聖萬象如如塔於古庭之側盡玄號如如澂江張氏子幼業儒因看楞嚴維摩諸釋典遂有出塵之想後棄家投幻空祝髮惟以叅究為事有叩問者隨機應荅著有三教直指金剛定衡性學正宗等書拈花寺乃師始剏也如桂號蘭宗黔中畢節人姓王年十八投所庵披剃遍叅海內知識精通教典住獅子林三十餘載修華嚴法界觀為宗諸山耆德無不欽仰端坐而化茶毘之時異香滿室隣僧念誠聞空中有天樂之聲周理徹庸禪師名周理雲南縣人姓杜生於萬曆十九年白氣出屋鄉人異之𦆵出襁褓啼不止有二僧登門賜名慧九九歲䘮父十一歲入鷄山大覺寺禮徧周為師時周預夢有大蓮花生於殿庭明日師至稍長篤志宗風有僧密藏開發叅禪之要後歷諸方得法天童密雲和尚歸鷄山妙峯開堂海眾雲集以棒喝傳宗滇南自古庭後二百餘年祖燈再熖實從師始晚住妙峯著曹溪一滴及語錄行世臨終示偈云生也如是死也如是夢幻空花物恒順常如是塔于妙峯山讀徹號蒼雪昆明人出家于妙湛寺歸鷄山為水月侍者年二十五行腳江南住吳門中峯為一雨法師上首紹長干十友講席者數十年宗風凛然詩名籍甚大興支公道塲著述甚富海內宗之有送唐大來歸滇詩云小艇難禁五兩風鷄山有路幾時通殷勤為我傳鄉信結個茆團在雪中後老於中峯不知所終洪相號應機雲南縣人幼入鷄山禮法光為師遍叅海內叩朗目于浮山將辭歸朗目贈詩云孤身遊萬里一錫振千峯心花開片片慧目演重重踏破曹溪旨叅罷少室宗訊謁諸方去歸家叩石鐘既歸石鐘眾欲請師住持師云我事尚未了寧能為人乎遂登九重崖結茅栖二十五年將謝世迎歸石鐘方坐乃云這遭我坐家裡了也合掌而逝如常號艮一宜良人自幼投大方和尚剃落後嗣所庵學華嚴法界觀師戒行威儀無可比者真懷號冲虛昆明黃氏子出家盤龍寺初不識文字遍遊海內住峨山二載苦行住五臺山九載學盡諸經後徧叅蘊璞憨山諸大師歸滇受具於所庵建不二軒居之後住傳衣十五年專心念佛誓欲往生淨土將遷化七日前邀山中耆宿告別至七日跏趺念佛而逝文璽河南人年十三出家往浙江叅湛和尚問何處來答曰牛山來湛云幹何事答云念佛湛云還要叅究師云怎麼叅湛云叅箇話頭師云某甲不會後至湖廣叅黃蘗請開示蘗大喝一聲云你看我這裡有個甚麼開示師亦不會又求請蘗搊住脇下抖三抖師亦不會遂求話頭蘗命叅父母未生前誰是我本來面目又十年不契乃發誓住山天啟年間來鷄足住九重崖不出戶者二十年單叅一箇誰字至不知朝暮春秋一日見撞鐘僧問云如何不撞鐘僧笑云𦆵放下鐘搥又呌我撞鐘一日說偈云一竅玄關在此時世間曾有幾人知若還開了通天眼步步頭頭合祖機後師道行既高接引愈廣鷄山僧眾以老河南呼之臨終辭世偈云我原本無我人亦且無人會得老僧意大地現全身真利和雅真利法師雲南大樹營人姓石幼投徹明為師遊方至金陵受戒于古心和尚傳教于三槐蘊璞諸大師談經三十餘會律徒半海內至楚為岷王師後還鷄山廣開講席至八十而終來秀號雲聚河南人苦行自持住四觀峯剏建金頂寺住山數十年精勤不懈崇禎末年無疾而逝寂定自如寂定法主劒川人遊歷諸方受戒於三昧和尚叅顓愚大師博通經典後歸鷄足山弘開法席建斷際處居數年劍川段氏敬師名德請開石寶山遂終老焉周續號傳燈葉榆人幼依大覺徧周出家壯而遍歷名山歸來日夜念佛不簡寒暑忽一日聞墻角西有喚聲云當中品往生師遂集眾眾方至師起立牀前而化手中數珠拄杖不墜後出茶毘惟數珠不化及視其珠乃木盾也印寛首傳寺僧也昆明人與還源禪師交善嘗于午齋後熟睡還源曰齋後即睡無碍乎寛云我睡在虛空何碍之有甲午年某月日忽囑寺僧云我來日午時當告別大眾即散其衣鉢至來日午時索筆畫蓮花及畫完乃一偈也偈云緣合則現緣離則寂體自真嘗了幻如是命僧徒送與還源端坐而逝慧鑑行僧也鎮南州白土城人于本處出家來山依大力住獅子林三十載夜遊念佛三年居無牀榻晝夜跏趺頂上燃燈計有三千餘盞而頂骨瑩白如玉年八十終于石鐘寺洪如無住洪如禪師定遠人姓鄧幼慕宗學萬曆丁巳同周芝公遇徹庸和尚即拜為師庸命叅狗子無佛性句後就河南大千祝髮復來鷄足叩徹庸入白雲窩苦叅三年無所得一夜坐高樓聞鐃鈸聲忽然大悟舉似徹庸庸許之陶不退問叅何話頭得悟師舉趙州無字陶曰無字聻師曰雪閣陶深然之仙楊黼先生者永樂年間太和人號存誠隱居不仕孝友好施庭前桂樹扶疎蟠蹙巢居其上因別號桂樓讀書不輟一日硯水竭欲下取之顧視則水溢矣自是有得後入鷄山栖羅漢壁崖穴中二十餘年年八十歸家卒卒之日家人見公從外入曰楊黼今日大事了也凡所交遊盡見其至家為別又有人於安寧道中遇之疑仙去也所註有桂樓集篆隸宗源卒之日又有人於貴州見之寄語諸孫計程是日已過二千里外矣道流雲和山東人舊居終南日久萬曆間入鷄足山住獅子林與山中名德結百期打七煉魔後不知所終周東華河南歸德人幼通三教尤精道德之旨年二十五雲遊方外崇禎甲申至鷄山後遊騰越人皆以神仙呼之周荅詩云人人說我是神仙我是神仙豈偶然只為南滇無大道故來此地示真傳後竟隱去高隱還源諱宗本俗姓曾名高㨗賓川人崇禎𢈏辰進士得第後於南京叅天童和尚言下有解遂不仕歸隱鷄足山天池齋晝夜叅究精勤不息流寓羅念庵諱洪先江西吉水人嘉靖己丑狀元隱退遊域內名山至滇入榆造弘山廬夜話走鷄足李中谿跡其後講道于賓蒼閣李禿翁諱贄號卓吾任姚安知府萬曆八年遊鷄山寓鉢盂庵聽經羅近溪羅汝芳號近溪吉安人進士雲南學憲萬曆丙子登山詩賦標題無寺不有歸家命子送藏寂光寺羲印諱圓易廣東人萬曆末年來遊鷄山與如正等交師精通宗教詩詞賦落筆千言道俗共欽後如正示寂為製塔銘載如正傳中陳潤之法名如清襄陽人萬曆𢈏申年同雲石王亨宇遊山栖蘭陀寺二載有餘王聚洲諱元翰寧州人翰林萬曆年間遊止鷄山譚文化號語公蜀梓州人萬曆壬戌進士于崇禎壬午入山栖片雲居三月餘片雲居即公題名也陶不退諱珽進士姚州人萬曆間寓鷄山大覺寺徐弘祖號霞客南京江陰人生而好遊欲盡繪天下名山勝水為通志遊遍京省閱盡天下佳山水崇禎𢈏辰將遊鷄足道經南京迎福寺有僧靜聞亦慕鷄足之勝徐遂攜之同行及至廣西靜文病且死囑公曰我志往不得達若死可以骨往徐憐其志因焚其屍取骨貯以木匣負之入滇及至山止悉檀寺欲于山中乞地葬之以了其遊山之志寺僧仙陀高其義為卜地葬於文筆山之陰建塔墓上晉寧黃郊為之銘曰孰驅之來遷此皮囊孰負之去歷此大荒志在名山此骨不死既葬既塔乃終厥志藏之名山傳之其人霞客靜聞山水為馨徐既葬靜文愛鷄山之勝遂止焉麗江土知府木生白聘修鷄山志剏稿四卷未幾以病辭歸楊雨太和人郡吏也有志節不與胥曹偶人餽之必問所從來或受十之一凡有事必力諍于庭守怒笞之起而復諍久而知其無他亦時時嘉納之一時無民冬月其鞾無襪藉之以艸役滿後入鷄山郡守物色之不得也見滇畧妙峯燕京人萬曆己丑賫藏入山貯華嚴寺後復命還京栖五臺山德心和尚不知何許人萬曆間入山或居庵門或宿樹下夜惟念佛經行大覺寺徧周亦嘗叩之乃為建室請講寶訓後四年返蜀開峨之洪春坪焉真全燕京人萬曆間來山徧周留之大覺嘗植一大木缸于鐘樓上日夜趺坐其中二十餘年崇禎丁丑冬夜坐缸中大聲念佛次早往視乃知化去而端坐儼然大千河南人嘗𥪡高竿頂上安一盤打坐又於街衝坐一二月不動萬曆年來山住猴子洞後至祿豐之獅子口建淨蓮寺終焉雪影名廣和杭州法師天啟六年來山寓悉檀寺與本無為道友朱直指敬其道行于四觀峯頂建天長閣居之後歸南京博山洪度號不空臨安府孝廉初于雲南玉案山笻竹寺祝髮名自度後歸依徹庸改今名嘗隨徹庸住鷄山僧眾以禪問之惟荅以念佛二字後於妙峯談律門徒甚盛臨終時或問曰和尚平日念佛此時何如師應曰我自念佛與汝何與遂寂然而逝名賢李中谿諱元陽大理府太和縣人嘉靖丙戌進士翰林院庶吉士建賓蒼閣讀書山中數年開建放光寺捐貲置常住田數百畞山中寺院凡傾頺者無不修葺兼為撰文立碑鷄山之盛公為首功矣本朝洪舒號印文楚雄楊氏子年十八投法光和尚披剃住石鐘閣禁足持誦彌陀七十餘年未嘗一日少間德行孤高重建教義閣徒眾數百年九十而化塔於本山之西學蘊號知空洱海張氏子甫十歲即入山投水月和尚祝髮住寂光寺精修戒律脇不至席者三十年建玉霖軒靜修後出山於楚雄開創九臺山學人數百臨終三日前集眾辭佛對眾云三日後天必雨雨時可相報吾好去也嘱畢遂入方丈趺坐不出至期午刻果雨侍者入報師命眾念佛隨出方丈將己鬚掠入口中咬定遶殿三匝不言復入方丈端坐而化年七十七塔於本山普行號非相迷渡孫氏子年十八投悉檀寺德周和尚祝髮隨創雲溪庵住靜二十年後入水目山叅無住禪師有醒遂主席斯山康熈𢈏午秋師於七日前鳴鐘集眾沐浴拈香畢隨將本身衣鉢送入塔中開視己塔安龕於內入龕跏趺不出四眾禮足哀請不已乃出與眾懽留二日至三日昧爽復入龕訣眾偈曰萬刦從今萬刼歸古幾根朽骨寄入水目窣堵喝一喝入寂時年八十有七普荷號擔當晉寧州儒士俗姓唐字大來以明經選不赴棄家遍遊歸而出俗叅水目山無住和尚往來鷄足點蒼間師善書畫索者盈門康熈癸丑冬一日趺坐說偈曰天也破地也破認着擔當便錯過舌頭已斷誰敢坐寂然而化壽八十一所著有翛園橛庵二集拈花頌百韻行于世淨極號達一山東兖州曹氏子生于崇禎戊辰年遊南嶽投學明和尚祝髮後叅諾諾禪師有醒康熈癸卯入滇初至臨安府修迎恩寺𢈏戌歲始住鷄足重建迦葉殿煥然一新戊午冬一日集徒眾慧㳒慧暉等囑云爾輩隨吾學道有年誠能一切放下大休大歇暢快平生庶不負多年勤苦示畢趺坐而寂時年五十有一塔於本山讀體號見月滇楚許氏子投寂光寺量如㳒師薙髮後歷海內遍叅知識無不印可受具嗣㳒於金陵三昧和尚主席寶華戒律精嚴門下嗣㳒六十餘人戒子萬計集有三壇正範指作二持行世康熈戊申示微疾坐化普勻號平若尋陽洪氏子七歲祝髮於寂光寺受具承嗣于鍾靈梵菴和尚主席斯山三十餘年名重兩迤門徒廣眾於康熈辛未冬十二月初二日在臨安大乗寺集眾傳戒畢辭眾云吾今不待爾等都來將衣鉢付囑廣因等畢喝一喝云當陽一喝出凡塵任運逍遙撒手行吩咐精勤三學者人天相外覓無生吃茶一盃而化悟禎號友山滇姚高氏子致仕出家于大覺徧周創曇華古佛林精修梵行數十餘年晝夜不輟一切名山古剎無不中興凡有傾圮皆賴修葺于康熈己巳七月六日坐逝塔于曇華山悟澄號淵明楪榆紳士楊春秋之子幼年辭榮入山禮無心和尚出家為徧周禪師之徒結茆放光寺左閱藏五載究明佛意臨終端坐而化周璧號印如楪榆阮氏子自幼入山禮徧周和尚落髮智性聰穎㴱究教乘明直指姜公遊山甚為相契有詩贈因鑄洪鐘至永曆聖主入滇頒賜紫衣洪敬號怡淵楪榆李氏子自幼禮徧周和尚出家慕道叅禪入獅子結茆修靜十越寒暑臨終辭眾尅時沐浴畢跏趺寂爾定去墖於正宗院後洪質號清宇雲南縣楊氏子丱歲入山禮徧周和尚落髮幹蠱叢林續賜紫衣時為山中知識紹繼紫衣後付洪讓而傳育山普見號一唯定遠人禮徹庸和尚為徒徧叅江南與房公請藏齎還大覺同徹師開堂妙峯法席主持四十餘載臨行鳴鐘集眾上堂辭世拋拄杖立化
