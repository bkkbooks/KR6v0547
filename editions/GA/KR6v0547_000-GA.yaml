body:
  text: 序雞山奇秀甲天下與峨嵋九華天台雁宕相為伯仲第以僻處滇西遐荒萬里東南之士鮮有至其地者然而歷攬山川非有煙霞之癖在亓胸中山水之緣結於夢寐不可與言遊不然農夫俗子歲之登臨往來繹絡其能領畧山川之勝者幾何若魯人先生則大異焉先生江左名士文章經濟傾動當世又性好吟詠閱歷山川幾遍天下所到之處無不留題積而成帙余嘗得縱觀焉今春有雞足之遊爰作遊記及登山諸什序次錯落得柳州筆意詩則少陵之遺不同凡響觀其杖履所至筆歌墨舞有瀟灑出塵之想而雞山名勝星羅碁置無不了然於心目間者先生所云身歷而得遙望而得神會而得之語詢非誣人也余流浪滇西十有餘載嘗窃慕斯山之勝未能一探其奇今而後將日誦先生之記與詩以當臥遊又何必戒行李命僕夫問道所從姑足云暢遊也哉是為序吳門同學弟陸翼拜題雞足山志序余宦轍所經頗與山水有緣尋嵩抵洛歷華之秦泛洞庭詣廬嶽臨浙濤探禹穴其間奇峰幽壑川月溪泉賢蹤聖路寶剎琳宮以及懸虹飛瀑古木名花平生意想不到之境靡不飫聞饜見而獨於滇西雞足山余心不能無憾焉自奉命撫滇榮歷兩任因駐節昆明與山相距數百里無從假道一徃每於公餘退食披讀滇志中遊山諸記亦苐就其人偶爾所至觸目濡毫以自冩其登眺臨流之致而於山之勝概巨觀呈奇競秀變幻莫可名狀者何能包舉無遺對此茫茫既乏探幽之便又鮮博物之書山靈寂寞未免笑人此余所以不能無憾也辛未冬制軍范公巡歷金江順遊名勝慨然增修山志事既竣寺僧捧志呈覽流連諷誦於山水形勢得起伏流峙之由於星辰分野得經緯昭囘之度於雲霞草木得霏布滋蔓之容於仙綱佛窟得貝葉琪花之𣲖於文章宗㫖得抒靈摽性之機於蟲魚鳥獸得屈伸動植之理別類分門搜鉅剔細栩栩然覺神遊其際而五百里之名山勝地近在磨丹漬墨間也播諸中邦洵為方外之奇傳諸奕葉並壽不刊之典且此書出而臥遊有具余亦得藉以告無憾耳是為序峕康熙三十一年八月既望廣寧王繼文序雞足山志序雞足山得名於宇內其來已久余少時嘗聞遊滇者談其勝心竊慕之然在萬里荒徼外名可得聞地不可得而至也今上二十五載奉命總制滇黔意以為雞山之遊或可得遂及抵滇駐節於昆明池上詢此山葢在葉榆境內距省尚數百里每披滇乗頗得其概心益艷之然束於官守雖欲登覽而莫由也辛未冬奉㫖廵歷金沙江因會提軍於賓川城下甫獲假道一遊信宿而登絕頂周覽形勢方知此山發脉西域來龍萬里盤迴紆鬱三嶺前伸一岡後距儼然雞足焉中界二溪支分𣲖衍恍有山陰道上千巖競秀萬壑爭流之致顧而樂之因向寺僧索山志僧曰無之因詰之曰斯山得名已久雖遠居荒徼徃古無論已自明迄今三百餘載豈無高人達士徜徉探覽紀其勝於車塵馬足之餘者乎僧曰昔曾有志創於徐弘祖輯於僧大錯疊罹兵燹板為火燬舊本散失無存間有存者亦不能無不純不備之感余以廵歷事迫疾驅去之今年春忽寺僧持舊志殘編至且請增修余思此山為滇西名勝不可無紀退食之暇聊為刪其蕪陋補其闕略付寺僧梓之雖余以倉卒經行未暇冥搜幽討備述其奇然而斯山之勝約具於此世有慕其名而未獲至其地者一覽是編俾萬里荒徼之山川可一旦而遊於几席之近豈非快事歟至於山寺土田多在賓鄧二州間盈縮無常增損不一其田糧賦役自有有司主之志內俱略而弗載懼混也是為序康熙三十一年歲次壬申孟秋月穀旦總督雲南貴州等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史加三級瀋陽范承勳蘓公氏題雞足山志序擅天地之靈奇者無如山水而能闡山水之靈奇者賴有人文是則山水之在天地非文而何能發揮若是哉昔謝靈運在當世其步履非不遍探索非不㴱乃獨遺一雁蕩是豈時之有顯晦良由足之有至有不至耳如雞山屬在西域稱名已久自釋迦佛於靈山拈花以示正法眼藏教外別傳之㫖特以衣鉢付囑迦葉命入定雞山以待彌勒歷周孝王至今三千餘秊事載經書豈虛誕而無所攷述哉然在向來名公鉅卿軒車或未一至即至亦僅信宿而返未獲留以文詞於是名山佳勝不同於草木之無聞也鮮矣昔有人識鐵船探玉策必經數日登陟載之以文是乃所謂搜奇覽勝者矣葢雞山去中華極遠文獻少所徵信自大䥘和尚纂修成志雞山之勝槩乃傳屹然與普陀五臺峨眉並峙其志雖不僃美而志實始於此辛未冬制府范公奉簡命廵歷諸邊乃於公暇即登臨焉復捐金建閣其上揮如椽之筆燦珠玉之章頓使佛土生光山靈起色將與燕然之石永𡸁奕祀山水之賴人文顧不重哉後之採風者披覽之下瞭然若指諸掌謹序臨濟三十二世香海本元冰壑謹譔舊序曹延生蜀人嘗讀天下名山記見吾鄉蛾瓦屋青城以及瞿塘灧預巫峯三峽之奇勝無不入名人筆底供其發揮而獨滇雲鷄足一山絕無紀述心甚訝之及𢈏子春以按部便過鷄山訪䥘師詢及山志闕如也始知滇雲古屬西域附中國版圖最後前代名賢罕至其地雖相如閬𠎣先後來遊維時荒昧未闢賦詠寥寥唐宋以來復淪于絕裔南詔阻化數百餘年雞山雖勝其不得附于山經水志高人才士之翰墨也宜哉余既承乏一方為此山長迄今不亟為修輯以救前人之失後死者其得與于斯文也哉幸大䥘和尚以江東大儒棲禪于此余因率山中比丘共為拜請俾為纂修始于春正成于夏孟凡佛祖之跡山川之奇梵剎人物之盛以及詩文物產之繁富靡不旁搜博採潤藻摛華體物狀情窮工盡態有是志書遊觀者可以觸發其才氣想像者可以舒暢其性情修攝者可以澄汰其塵滓余遊雞山不過三日遂以公事去恨未得領其萬一夢魂峕為神徃幸志書告成徃復讀之一丘一壑朗然心目以當臥遊無憾矣昔人窮洞庭兩山十七日不能盡得禹書靈文以歸殆余今日之謂與因付之剞劂願與海內好奇者共之也沈天錫浙江往見晉僧法顯西域記述靈鷲取經見迦葉尊者及諸佛化奇跡以為怪誕不可信及己亥宦滇駐大理凡諸佛菩薩種種靈跡多在百里之內與法顯所紀往往符合考城西一塔寺碑文塔屬周峕建造而三塔又有四天王荅唐律師事乃知此即佛苦行之地在宋以前版圖未附中國故中原人以為遠而異之及今耳目相習又以為近而疑之無足怪也𢈏子春以便道遊鷄山適大䥘和尚有修誌之事余索其稿讀之山水之奇佛化之異以及寺宇人物之名盛無不搜羅辨析靡有疑誤余不覺神飛舞因為探歷幽險窮四觀峯華首門之奇跡天險萬仞陡矗危削信乎其為佛地也然二十餘年紀載不傳文獻無徵今幸䥘師以吾鄉碩儒載千秋之史筆紀荒外之名山頓使佛教重灮山川生色豈偶然哉夫山水之著述昉于山海經而縱宕于水經一注後人雖極意粧點終不能出其範圍今䥘師羅正變之鴻藻集今古之大成雖柳河東一代名手山水諸記最稱奇削視此瞠乎後矣余幸與𠫵訂之軄因不揣荒昧合十讚歎而為之序大錯和尚俗名錢邦𦬊江南人嘗讀尚書至禹貢見其辨土宜物產必先詳山水之源流界域及見唐一行論星氣占測則專以河山為界而不係於州國夫河山既以占星氣則其中之災祥修悖自當與國政民事為盛衰始知聖人著述關繫微渺固儒者所宜討論也吳越春秋及越絕書皆言禹得金簡玉書於衡岳乃知山川之理使伯益作山海經既告成功藏於洞庭之苞山龍威丈人竊之以獻闔廬維時童謠有云天地大文不可舒可知文章之道與山川相終始非細事矣漢桑欽著水經原始崑崙星宿酈道元因為之註古今山川物類奇險幽遐一披覽焉而薄海內外瞭如指掌從來史官撰述無不援引其說以相證㨿不能異也攷歷代史書之外有郡邑志多詳城郭賦貢風俗別有名山志則專載山水寺院人物詩文之類夫豈哆炫奧博哉亦所以存埜史之遺文僃作史者之徵信耳余自甲午祝髮貴筑即慕滇中鷄足之勝思欲一遊以叩迦葉入定之處至己亥冬始得登山遊覽攀崖捫壑搜奇弔古歷數十日而其奇未厭也越𢈏子春未孩曹公偶爾來遊向山中比丘索志書一觀眾乃瞠然應以無有曹公曰茲山為尊者道場與五臺蛾普陀九華並稱域內久矣而志書闕焉使遊覽考古者茫然無從問津豈非我輩之責哉次日即率僧眾向余拜請俾撰述以灮名山夫山水之文豈易言哉嘗上下千百年間自應劭封禪儀諸葛武侯黃牛廟記及柳河東遊記之外佳者葢寥寥焉且余自投跡空門惟習禪觀之學筆墨荒廢久矣安敢以寡昧之質謬當重任辭之再三不得勉為網羅放失採集舊聞與無盡及山中禪㕛參論筆削積百四十日而稿始成嗟乎滇雲舊屬西域漢峕乃通中國至元始入版圖雖子長相如賈閬仙輩偶一至止而絕無紀述宋祖玉斧一畫且舉大渡外棄之故宋臣撰洞天福地記竟遺鷄足葢足跡未經故難縣揣文獻無徵所從來矣茲又當兵燹之餘斷簡殘篇復歸煨燼憑空撰著閉目揣摹求其不為好古博聞之士所嗤摘也難哉雖然使余不亟為採述以供有識者之覆瓿更百年後搜奇攬勝者愈無從得其梗概不又貽廢闕之誚哉用是不憚譏評私創其畧聊供異日討論潤色之資若曰藏之名山傳之其人則俟後之君子雞足山志目錄卷之首序舊序像賛雞足山指掌圖指掌圖記卷之一攷證星野形勢卷之二山水上山峯崖壁林洞臺坡岡嶺石峽谷箐坪窩窟卷之三山水下水溪澗壑瀑潭泉池塘湖卷之四寺院上寺菴閣樓殿塔祠卷之五寺院下羅漢壁靜室四十九處栴檀林靜室十三處獅子林靜室四十二處九重崖靜室一十五處諸菴院靜室五十二處右合山靜室共計一百七十一處亭坊廟橋卷之六人物禪僧仙道流高隠流寓名賢卷之七靈蹟峰頂四觀附雞山八景物產樹花果鳥獸食品卷之八藝文上宸翰遊記卷之九藝文中碑記賦卷之十藝文下詩五言古詩七言古詩歌行五言律詩七言律詩五言排律七言排律五言絕句六言絕句七言絕句迦葉尊者守衣入定像迦葉尊者守衣入定像弟子方正陽敬寫鷄足山迦葉尊者讚我聞飲光久滅意根圓明了知心念不存猶風鼓槖雖出無垠如月印潭穿水非痕所青蓮顧眄殷勤正法眼藏付之混淪一花五葉鈍滯兒孫向雞足定入華首門捧鬱多僧待補處尊金陵雪浪沙門洪恩盥手讚鷄足山指掌圖記大䥘和尚自河圖雒書並出而垂文字之訓古之聖賢必左圖右書葢觀玩之學書之講論者淺圖之悟入者深也余讀劉向之書乃知古人著述圖居其半自漢以後文字漸盛而圖象之學杳然無聞至若山川之形勢有言語所不能狀者非圖以繪之其何以使披覽者一見會心哉况名山大川散布人寰若五岳十大洞天俱在衣冠都會之地舟車奔湊之區其林泉丘壑之美著于有聞葢地勢使然至于鷄足邈處滇雲雖為佛祖示化之地而去中原絕遠又附版圖最後天下想聞之而恨不覩其勝雖逸世高蹈之士希靈慕道之人亦遠阻河山憚于䟦陟而身至其地幽探遐討者鮮矣山之高自麓至巔九千四百丈周圍四百里前列三峯後拖一嶺宛然鷄足之形其中分見之山四十有奇峯十有三崖壁三十有四洞四十有五溪泉一百餘所至於岡嶺壑澗林谷峽石有不可勝數者雖山中深隱積修之士未易徧覽而况士大夫來遊者暫至倐還旬日而罷又安能周知其勝使山無遯奇哉此指掌圖所以作也遊山者自蒼波山麓拈花寺過辭佛臺三里循山徑卥北轉至白石崖順岡南下二里為金母山山下即雪陰橋橋之卥為河子孔過橋卥北行一里至接待寺寺後上坡為九蓮寺過石鐘澗華津橋到報恩寺後有雲溪菴繇葫蘆澗過石梁橋至大士閣循解脫坡北上至觀瀑亭西對玉龍瀑飛流千尺為一山勝觀自此直上為牟尼菴東轉稍下為石鐘寺寺前鉢盂山下為鉢盂菴菴左折過溪為龍泉菴左又有五華無我二菴自此下坡為悉檀寺寺前即大龍潭南下過伏龍橋東行三里至文筆山為塔院內有尊勝塔後為振衣岡俯視靈山一會坊及土主廟不啻千仞繇文筆山西折北上至集賢山下有古雪齋左為片雲居即余與諸道友修志處繇片雲居卥過滿月山至天池山下為白雲居右為毘沙精舎卥即鉢龍室前為綠淨山房由南下坡東轉為斷際處從後卥折為圓淨法界二菴過倚杖溪逍遙橋為大乘大士大智淨覺極樂寶蓮諸菴此後有幻住菴蘭陀寺稍前為圓通寺右即𠧧竺寺北轉為龍華寺卿雲菴西有萬壽菴卥北上為大覺寺寺正對息陰軒右轉過溪為千佛寺觀音寺法華靈源二菴上坡過響雪橋為寂光寺西轉為水月菴積行菴更西為首傳寺過九溪橋為燃燈寺轉西北上即明歌坪勝峯寺寺左隔澗有白雲寺補處菴少上過慧燈菴左為彌勒院再上三里即迦葉殿殿左為羅漢壁有楊黼洞即楊真人修真處東有卥來碧雲二寺及靜室四十九處由羅李二先生坊上為仰高亭再上為真武洞傍有真武閣又上為兜率菴二里至銅瓦殿左有袈裟石殿後上猢猻梯為大悲閣過三天門即四觀峯頂矣頂有羅城城內有金殿後有佛殿最後為天一閣峯頂望西域雪山瑩白如銀卥望點蒼近若咫尺俯瞰洱海一衣帶水耳峯卥北二里為大觀閣下至文殊崖文殊閣舊址存焉西為捨身崖更卥為束身峽有仙奕石虎跳澗過此為禮佛臺更卥為玄關洞妙高臺又東轉一里至曹溪水又二里八功德水從此東南二里即華首門門前有雙塔旁有金鷄泉至此仍由銅瓦殿下至迦葉殿勝峯寺由勝峯寺正南直下為隆祥寺妙覺慧靈天竺無住凌霄諸菴法明祝國二寺至雲海菴毘盧閣達華嚴寺萬松菴直至傳衣寺寺左有菩提塲雷音寺般若淨雲圓通彌陀曇花等菴稍左箐中又有慈雲開化二菴由勝峯東轉為𣃼檀林獅子林𣃼檀林靜室十四所獅子林靜室四十二所是為棲玄最勝之處更東為九重崖靜室亦一十五所由勝峯寺卥折七里為放光寺更卥過曇花箐五里即金華菴又五里為大聖寺又一里為龍翔廣恩二寺又卥十五里為懷恩寺山後又有華藏洞小石洞上下石潭及慈聖寺大約山踞三州之勝峯秀數郡之間大寺八小寺三十有四菴院六十有五靜室一百七十餘所其間幽洞危崖奇峯怪石曲澗清泉不可名數使此山在通邑大都三吳兩浙一丘一壑其入名人韻士之品題者不知何限而乃僻處滇南介在蠻服文人墨客過者甚稀遂冺冺無聞余以纂修山志僑寓半載與眼藏仙陀把茅中也德音諸道友攀危陟險伐山窺穴雖樵牧絕跡之巔猿猱𨚫步之處無不窮討冥搜把筆紀勝從此鷄山勝跡幾無遯隱雖然四鎮五岳假封號以稱雄福地洞天藉撰述以自顯鷄山獨以荒遠見屏豈山之罪哉自指掌圖一出海內名賢臥遊是賴鷄山始出而與名山大川爭勝千古山水遇合固亦自有因緣哉緣合則方壺員嶠岱輿遠隔弱水三十萬里可以蹻車飛空而到緣未合則蓬萊瀛洲方丈近對會稽雖驅石填海終弗可逢也為是圖成復系以記後之君子以覽觀焉
