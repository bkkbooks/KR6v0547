body:
  text: 寺院上野史氏曰滇南古屬西域天竺界內自西漢以後始通中國前此帝王之化不及而彝俗愚悍賴佛教化導興起善思郡誌載茲地舊有三千蘭若鷄山元旦僧俗燒香散花遠近至者萬計自漢迄今無虛歲可知滇南崇信佛教殆先於中國今村野土民多有不畏王法而談及因果報應則凜肰敬信者肰則釋氏遏惡揚善之功有助於帝王之治匪淺也誌寺院寺金頂寺在天柱山四觀峯古有方塔一座今毁弘治間有僧建庵其上至嘉靖年郡人李元陽建普光殿萬曆己未直指潘𤃒建觀風閣天啓丁卯直指朱泰禎建天長閣崇禎丁丑直指張鳳翮建善雨亭築羅城上立四觀樓己卯直指凃必泓建景星亭辛巳黔國沐天波移雲南省城太和宮金殿來山廢普光殿併塔就其址以立金殿順治甲午因殿宇頹廢合山耆宿同僧自玉重修因觀風閣舊址為佛殿廢天長閣為伽藍殿廢阿難殿為藏經閣廢善雨亭為臥龍軒廢景星亭為碑亭後有土主殿前有靈官殿康熈三十年殿閣俱災惟銅殿獨存三十一年總督范承勳提督諾穆圖重建天一閣於觀風臺舊址僧慧酪福峙募姚安土官高奣映子映厚重修殿廡過道山門山頂風厲冬春之間積雪不消而寺居其上孤聳寒寂非有志者不能久居也迦葉殿原名袈裟殿在插屏山麓登絕頂懸崖之半此寺創自先朝年代莫考古碑碣有云周昭王五年丙辰牟尼佛出世其脫衣正在此處故名袈裟殿唐天寶時供刻像於此又名迦葉殿明初間有羽人結一小庵至成化時傾廢嘉靖壬子僧圓慶募鄧川土官阿子賢建寺後又傾圮復募阿國禎重修萬曆壬子阿岑增修僧洪詔募造萬佛銅塔一座順治戊戌僧廣高與合山重修康熈丁未灾殿閣樓塔俱燼𢈏戌年山東僧淨極重修丙寅年又灾徒慧文重建殿廡惟塔未建辛未年徒慧輝募南藏全部並水陸莊嚴還貯本寺接眾飯僧內有土主殿相傳為沙音灼漠土主葢其神自西域隨護迦葉尊者至此山云石鐘寺在仙鶴山下背靠獅子林望臺面向鉢盂山寺創自唐時明永樂正統間勅賜大少林寺僧了通了曉重建并後閣康熈𢈏戌僧洪舒廣𧇩重建殿閣上供三世佛接眾飯僧按寺名石鐘者閣之左古有澄潭上懸崖石叩之如鐘鳴故以名寺今潭石俱廢相傳有圓石形如鐘者譌也寂光寺在錦霞山之下背靠栴檀林弘治年初剏花椒庵嘉靖初年為奸徒盜葬已而毁庵僧悟明控官斷復三十七年僧本貼同蘇鵬程楊舟建寺萬曆年僧儒全募童指揮重修天啟間儒能再修康熈己巳僧學彥通智重修聖峯寺在鐘靈山前即古明歌坪背靠青檀山面向尊勝塔院左去數百歩接淨居林嘉靖辛丑年僧淨月開建其徒道裕德住相繼增大之後有玉皇閣左鏡光閣右觀音殿康熈𢈏申災甲子僧寂佐募修按此寺址為明歌坪者淨月初建寺時掘地得碑上云迦葉入定時八明王歌詠頌佛於此地古稱為明歌坪云華嚴寺在鷄足中峯之中背靠熊羆岡面向九重崖嘉靖間僧真圓建庵後黔國公張郭二總管擴為寺內有沐公祠萬曆𢈏寅頒賜藏經乙卯年灾僧海川募張舉郭子榮重修麗江土知府木增建藏經閣戊戌正月灾康熈癸丑僧照敏照彥募江西客人吳文華重建總督蔡毓榮巡撫王繼文俱有題額按寺址林巒深邃原係熊窟僧真圓選勝至此趺坐通宵眾熊大吼散去僧遂居焉傳衣寺即古圓信庵在鳳凰山下背靠萬松山岡左尊勝塔右白石庵得山水大會鷄足中峯盡處也嘉靖初年僧性玄同李元陽剏建隆慶年灾萬曆丙午僧寂觀重修康熈己酉僧心怡源霔源統重修大覺寺在紫雲山前萬壽庵之上背靠望臺左去龍華寺數百歩右鄰千佛閣萬曆初年寂光寺僧儒全同城楊宗堯建一小庵萬曆十七年楚僧本安同吳僧福登賫慈聖太后懿旨一道頒藏經至山儒全宗堯延請本安居之至三十年僧可全增大為寺康熈癸卯僧周璧洪質普宜普開新建大殿廊房悉檀寺在滿月山下大龍潭之上後靠石鼓峯萬曆丁巳麗江府土知府木增延僧釋禪建天啟四年勅頒藏經賜額祝國悉檀禪寺崇禎己巳建法雲閣貯之至辛未年其子木懿重加丹堊宏麗精整遂為一山之冠辛巳年僧道源往朝普陀又請嘉興府藏經一部歸貯奉大殿中康熈丁卯年僧妙枝教綿募麗江土知府木㙓重建門閣龍華寺在白花山前西竺寺之上背靠望臺左接極樂庵右鄰大覺寺弘治年間僧圓亨建嘉靖甲子僧悟學募李元陽修治萬曆戊午僧洪聚王治中重修後有潮音閣嘉靖丙寅僧周堂募彭文學建萬曆乙卯僧普坤李春富重修放光寺在瓊樓山下倚壁参天面山橫案適當鷄山之胸臆嘉靖丙午僧圓惺同李元陽創建萬曆三年灾圓惺復建戊戌年勅頒藏經後有藏經閣久已傾頺崇禎間合山耆宿重修康熈辛亥灾萬壽庵僧文波募順寧知府楊重建藏經閣西竺寺在龍華寺之前弘治間僧慧徹建了空庵其徒德林擴大之更名古松庵萬曆乙未圓瑞重修為西竺寺後有昊天寶閣姚安陶珽讀書于此辛卯年灾甲午年僧真崇重修千佛寺在寂光寺之下前對靈源庵嘉靖甲寅僧明玉李元陽剏建天啟間性㓗重遷建之接待寺即古福緣寺在中峯之麓背靠傳衣山岡左里許接九蓮寺剏建自先朝年代莫考永樂年商太監同僧普炤重修後燬嘉靖二十二年僧致學募李元陽重修遂移今址萬曆年天心和尚居此接待往來僧眾更名接待寺後有觀音閣今廢首傳寺在積行庵西南萬曆丁丑僧周樂募建康熈丁卯僧德海重修蘭陀寺在金龍潭背靠獅子林萬曆間黔國公建延法師真澄居之康熈𢈏午僧寂尚寂戒募化重修傳燈寺即銅瓦殿原名迦葉寺在猢猻梯之下左有袈裟石右百步許接華首門即迦葉入定處故寺即以此名正德間僧圓成同北勝州土官高世𢡟建鑄銅瓦為殿萬曆間中丞唐時英修後鄉官李元陽更為增擴乃樹碑以記之西來寺在羅漢壁太華靜室之左萬曆年僧如唐禪棲於此崇禎十年其徒性讓改建為寺今廢碧雲寺在西來寺左腋下天啟年僧幻空創建康熈三十年僧有悟有光重修祝國寺在毘盧閣左萬曆九年僧普宗剏建辛卯明月重修康熈三十年僧真奇重葺白雲寺在補處庵之上萬曆甲午僧古事建陶不退更名定雲庵今荒廢法明寺在毘盧閣之上萬曆己丑朱廷偉同僧普宗剏今廢燃燈寺在象鼻山前首傳寺右二里許萬曆年建後灾崇禎初年僧自周重修今廢隆祥寺古名白井庵在聖峯寺垂巒下三里許成化年剏建嘉靖間僧戒寛修建康熈丙寅僧福昹重建圓通寺在西竺寺東隆慶元年僧德成建萬曆丙午其徒真鳳擴大之崇禎年間性寧重修迎祥寺即鉢盂庵在石鐘寺之南鉢盂山下嘉靖年陳𡏬剏建李卓吾嘗寓此聽經崇禎丙戌僧周定重修康熈丙午僧普宜廣富重修觀音寺在息陰軒後嘉靖年僧能中建萬曆二十九年郭子榮重修今廢三摩寺在象頭山前即大士閣萬曆乙巳直指沈公正隆剏建徵僧古言居之康熈丙辰年僧德海德壽重修雷音寺在淨雲庵左萬曆年僧黙庵先建止止庵於般若庵之下李元陽楊如檟遷於今處改名雷音寺崇禎間僧海法重修內有聽竹軒九蓮寺在福緣寺西里許嘉靖間接待寺僧居靜於此萬曆三十八年延僧無為㞐之遂建寺其徒紫真覺用相繼增修順治丁酉本湛重修康熈三十年蜀僧自證居之報恩寺在尊勝塔院垂岡之下嘉靖初年建萬曆𢈏寅姜應雷修治順治壬辰僧寂順重修康熈壬申僧通璧重修拈花寺在蒼波山下辭佛臺右三里許為入山之第一剎面對蹲象山自此至山頂計四十里萬曆年間趙日新建後有玉皇閣羅漢寺在大龍潭上悉檀寺前剏自先朝年代莫考今廢覺靈寺在放光寺西三里許嘉靖初年建今改為迦葉殿塔院大聖寺在金華庵下五六里許萬曆辛卯僧普霖建廣恩寺在翔龍寺左嶺下半里許萬曆十年僧炤能建翔龍寺在大聖寺西三里許萬曆丁巳僧通文同鄧川庠生張瓚建康熈丙寅本寺僧体微重建飯僧結眾白鹿寺在金華庵之左威音寺右萬曆年建今廢威音寺在檀花箐西十里許背靠木香坪萬曆年僧普明建今廢懷恩寺在鷄次坪西後山之麓乃鄧川登山必由之路嘉靖年大理府卞經歷建今廢慈聖寺一名幻居庵在萂勒村之上萬曆年僧妙瑞建此處最多佳木花果前後俱有流泉池沼牟尼寺在牟尼山去鷄足六十里謝撫院買山為僧釋禪建中有塔吉祥寺在大覺山天啟年僧可全建今廢庵院補處庵在白雲寺下背靠羅漢壁萬曆丙子僧如正結茆於此後周𢡟和倪拱宸擴而為庵康熈辛亥僧文相大幸募修幻住庵在林泉室下一里許萬曆年僧如堂建順治初年灾僧淨立重修康熈戊辰僧普嚴募修尊勝塔院在文筆山乃鷄足左峯盡處迴顧一山如張圖畫崇禎戊寅麗江府應襲木靖同悉檀寺僧道源道真剏建中立尊勝塔高六丈六尺周匝禪室四十楹製度宏淨頗堪託勝散懷順治丙申木氏復捐貲冶巨鐘重二千餘斤晨夕鐘聲震响一山精修之士藉以警動昏沈即愚罔之夫亦可以震醒聾瞶實聞修之一助也康熈己巳僧教綿教立募土官木櫾孫土知府木興重建彌勒院在慧燈庵左背靠迦葉殿剏建年遠日就傾圮丁亥年僧正用募鄉紳吏部曾高㨗遷址重建康熈丙辰僧學融重修接眾片雲居在集賢山下古雪齋之左崇禎辛巳僧道涵建𢈏子春大錯和尚寓此修鷄足山志康熈癸丑僧教卓重修白雲居在天池山下右去二百步為圓淨庵崇禎癸未賓川鄉紳曾高㨗延僧圓彩建曾晚年祝髮隱修于此康熈辛亥僧妙熏同曾學祖重修古雪齋在集賢山下片雲居右崇禎甲午僧道源道慈建內有蒼波閣康熈甲寅僧教綿募修罔措齋在寶蓮庵內僧普荷隱居於此著有罔措齋頌古息陰軒在觀音寺之南萬曆壬子憲副馮時可為僧釋禪建崇禎十三年麗江府知府木懿重修康熈己巳僧教運重修菩提塲在般若庵左萬曆年僧周科建後荒廢丁亥年僧本達募周京重建今廢圓淨庵在白雲居右嶺嘉靖年僧周嚴建法界庵在圓淨庵右嶺萬曆初年僧圓心建康熈壬寅僧廣息重修五華庵在龍泉庵左嘉靖元年僧如月募眾建𢈏戌重修康熈三十年僧德壽重修無我庵在龍泉庵上嘉靖年僧普周建萬曆間灾僧道定重建今廢龍泉庵在小龍潭上萬曆𢈏辰僧古爾建門外有染池緇流取其土以染衣大乘庵在大士庵左弘治初年僧悟禪剏建康熈己巳僧洪敬重修大士庵在大智庵左剏建年遠莫可稽考嘉靖丁未僧可解募李元陽重修萬曆丁亥僧周儒再修康熈癸卯僧廣嚴重修大智庵在淨覺庵左一名慧燈院萬曆乙卯僧如顯建淨覺庵在圓通寺左嘉靖二十五年僧真蓮建萬曆壬辰威遠州刁土官重修癸巳年僧洪宣重修極樂庵在淨覺庵右舊為湧泉庵在寶蓮庵斗母閣之上嘉靖年僧真山真用同建後因山水崩瀉庵為之圮萬曆二十年僧如海遷建今處更名極樂一名太平庵一名地藏庵一名淨寧寺崇禎𢈏辰僧洪鏡重修康熈𢈏午僧普合募土官高奣映重修寶蓮庵在鳳毛山下淨覺庵上古名蓮宗寺萬曆𢈏辰僧真慧剏建順治戊戌僧普荷重修內有罔措齋庵後舊有斗母閣今圮萬壽庵在西竺寺右萬曆己亥僧真松募眾建康熈己酉僧海淳重建卿雲庵在潮音閣上萬曆二十二年僧周徹募楊續芳剏建崇禎間僧洪聚重修相傳迦葉入定旹有彩雲飛繞於此因以名庵康熈甲子僧宗源重建牟尼庵在鉢盂庵右隔澗半里許嘉靖間有僧建茆庵於此施茶因呼為茶房後囘祿楊周改建為牟尼庵延僧智空居之萬曆年灾僧寶印重修法華庵在觀音寺右嘉靖間僧圓光建萬曆壬子僧如松重修崇禎十年僧海榮重修康熈己巳僧通璧募修靈源庵在觀音寺之上萬曆三十年僧如金建今廢妙覺庵在燃燈寺下萬曆初年僧圓貞建崇禎十二年僧真式重修康熈戊辰僧真密重修天竺庵在慧靈庵之下嘉靖四十年僧悟能習靜於此萬曆十一年其徒大千募韓璠建庵萬曆四十四年僧普伸重修康熈𢈏午僧自明重修慧靈庵在天竺庵上舊址在天竺庵下正德間僧可秀習禪於此有天人送供之異萬曆間包見㨗沈時泰重修崇禎四年僧普信移建今處但荒僻寥落無人居之雲海庵在祝國寺下天順年僧智曉同徒慧雲建後因囘祿嘉靖間僧普宗遷建天啟乙丑僧清滿重修康熈壬戌灾𢈏午年蜀僧天璧重建即萬壑松濤八景之一無住庵在隆祥寺右里許萬曆間僧真鸞開建康熈𢈏午僧寂玉募修凌霄庵在明歌坪右腋凌霄山之下萬曆二十八年僧圓恩建今廢慧燈庵在彌勒院西背靠迦葉殿萬曆乙巳僧洪平結茆習靜於此崇禎甲戌其徒普現募朱新祈擴址建庵康熈壬申僧宗海募修海會庵在勝峯寺之下嘉靖癸卯僧潓壽建今廢積行庵在滿月軒西萬曆三十四年僧靈骨建康熈壬申僧德悟重修水月庵在寂光寺右內有清凉閣雲鶴塢萬曆年僧用周習禪於此其徒廣月擴大之曇花庵古名八角庵在傳衣寺之左嘉靖間僧圓炳建隆慶年灾萬曆初年僧真悟募阮尚賓重修康熈丁巳僧寂洪重修淨雲庵在彌陀庵左嘉靖乙未李元陽同僧真炳剏建天啟元年僧如江募洱海楊土官重修崇禎乙未僧性杲再修內有懶雲窩無我室康熈壬申僧肇先重修圓通庵在彌陀庵右嘉靖間僧海印建丙戌年僧心慧重修康熈甲寅僧無然重修彌陀庵在圓通庵左嘉靖間僧如松建隆慶年灾萬曆八年僧了貴重修康熈丙寅僧源敏募修萬松庵在松雲山下古名蘭宗寺嘉靖間僧圓清建舊址在左腋中天啟辛酉僧如桂募李中谿遷建今地廢般若庵在菩提塲右嶺下隆慶間僧海眾建後廢崇禎初年僧雪峯重修癸巳年僧心怡再修康熈辛亥僧源統重修慈雲庵在傳衣寺垂岡左側嘉靖年僧三昧建崇禎末年僧性文重修康熈壬申僧寂洪募修開化庵在慈雲庵下萬曆三年僧真鸞開建崇禎辛巳僧性永重修其址先有龍潭自真鸞開基龍遂譲地而出泉於左腋之下康熈辛未僧照瑞募修雲溪庵在報恩寺右萬曆年僧道備募眾建康熈癸卯水目嗣法玄顏重修白石庵在白石崖乃鷄足右峯盡處左二里許接洗心橋右二里許接辭佛臺弘治間僧明正募洱海楊土官建其崖壁玲瓏洞壑幽邃極天劃神鏤之巧今廢金華庵在檀花箐西五里許嘉靖年僧南嵩開建伏虎庵在曹溪庵之西崖今荒圮曹溪庵在古佛洞西左腋出泉甘美如曹溪萬曆癸卯僧明悟建直指宋興祖重修今荒廢功德庵在八功德水上萬曆年僧雲聚居靜於此今廢藏頭庵在盤陀石北小澄臺上萬曆年建今廢兜率庵在滴雪崖前嘉靖初年蔡關主建集僧煉魔於此今廢觀音庵在象鼻山寶藏庵之上萬曆四年李元陽建今廢寶藏庵在觀音庵下燃燈寺之上今廢圓覺庵在凌霄庵右嶺下創建年遠莫可考論今庵已傾廢惟故址存焉瀑布庵在瀑布崖之西嘉靖年建今廢淨土庵在傳衣寺下萬曆年建今廢慈聖庵在淨雲庵右萬曆間僧圓昇移瀑布庵於此今廢大力庵在彌陀庵內嘉靖年僧大力建今廢水露庵在大士閣下今廢奉真庵在翔龍寺下萬曆間僧普潤建今廢盤龍庵在法明寺前今廢獅子庵在獅子林山後獅子窩其間林木深曠人不能居今廢東塢庵在獅子庵之北東塢村土人建今廢以上自金華庵起至東塢庵止十八處皆廢繼周庵在山麓沙址內居女僧天啟年建袛園庵在沙址村右康熈丁巳僧慧自新剏永勝庵在沙址村後康熈丙寅僧淨光新建閣玉皇閣在聖峯寺內萬曆間建崇禎年北勝州枈州守重修御藏閣在放光寺內萬曆年剏建以貯藏經明末洱海道何閎中鄉紳曾高㨗同八大寺重修康熈甲寅僧文波新之石鐘閣在石鐘寺內萬曆年僧了極募孫學易建其徒周輝洪舒重增大之以貯藏經順治戊戌燬於兵火康熈壬寅僧洪舒復建法雲閣在悉檀寺內崇禎二年麗江土知府應襲木懿同悉檀寺僧道源道慈剏建以貯藏經辛未年重修潮音閣在龍華寺內嘉靖丙寅僧周堂募彭文學建萬曆乙卯僧普坤募李春富重修康熈戊辰僧宗㓗同庠生李朝鳳重修華嚴閣在華嚴寺內萬曆年麗江土知府木增剏建以貯藏經丁酉年灾觀風閣在四觀峯頂萬曆己未直指潘𤃒建今廢天長閣在四觀峯頂天啓丁卯直指朱泰禎建今廢藏經閣在四觀峯頂羅城內佛殿後即禪僧廣稱閱藏之所大觀閣在四觀峯之後二里許玉枕峯上萬曆年建今廢千佛閣在靈源庵之上嘉靖甲寅李元陽同僧明玉建奉佛千尊今閣廢遷建為寺毘盧閣在祝國寺西背靠青檀山右去半里許接華嚴寺萬曆𢈏戌僧如文募王麒剏建太子閣在華首門即迦葉入定處先年有僧建庵於此日就傾圮嘉靖四年僧昌玉同阿國禎重建鐵瓦殿萬曆己亥僧性來募周𢡟和建二方塔癸巳年鄉紳曾化龍重修康熈𢈏午舉人曾學祖同僧學融重修大士閣在三摩寺內萬曆乙巳直指沈正隆建康熈𢈏申僧德海德壽重修明鏡閣在聖峯寺內古有鏡千百面懸於其上今鏡失閣存拈花後閣在拈花寺內天啟年趙輝寰同僧普念建真武閣在仰高亭上玄天閣在碧雲寺後即幻空靜室也迎祥閣在鉢盂庵內康熈甲子僧普宜重建蒼波閣在古雪齋內大錯和尚題扁取唐句連山若波濤奔走似朝東之意光明王閣在九蓮寺內極樂寶閣在大乘庵內清音閣在大士閣左澗中天啟年僧排清建大悲閣在猢猻梯上萬曆間僧可極建今荒廢文殊閣在四觀峯二里許嘉靖年建今廢普賢閣在大悲閣之上萬曆年建今廢賓蒼閣在拜佛石之上正德年郡人李元陽曾讀書於此今廢袈裟石閣在銅瓦殿左數十步大石𥤮起青石白紋分為條片宛肖水田衣之狀世傳迦葉晒袈裟於石上故遺跡存焉嘉靖初年僧圓清結茆於此後搆小閣今廢微笑閣在迦葉殿旁嘉靖年建今廢千手閣在西來寺之左萬曆年僧如唐建今廢昊天寶閣在西竺寺內萬曆丁丑僧德林建今廢斗母閣在寶蓮庵內萬曆年建今廢玉龍閣在瀑布之上大理周太守建即龍吟壑今廢觀音閣在接待寺內今廢天一閣在四觀峯頂觀風臺舊址上康熈三十一年總督范承勳提督諾穆圖同建樓天咫樓在迦葉殿前順治丁酉修建上貯藏經中奉萬佛塔最為莊嚴其樓三層而地形又最高故名天咫康熈三十年災三十一年僧慧文重建樓僅二層巡撫王繼文題額九年樓在寂光寺殿右內供藏經達磨尊者不立文字面壁九年斯樓之稱葢欲閱藏經者觸目警心不借文字為津筏耳二觀樓在大覺寺正殿前內貯藏經樓以二觀名取道德經有欲無欲之義錦雲樓在傳衣寺佛殿右萬曆年建以貯藏經樓前有大山茶一株其高五丈大七圍花及萬朶開時爛若堆錦枝柯入總朝暾初升影映櫺檻炫人瞻顧其下又多種杜鵑英燦繁麗樓以此名殿金殿在四觀峯頂銅鑄為殿外以金裝梁柱窻壁備極精巧此殿原在雲南省城鸚鵡庵太和宮崇禎辛巳黔國公沐天波移建峯頂因名此寺為金頂寺銅瓦殿又名銅佛殿在傳燈寺正德間北勝州土官高世懋與僧圓成重修此殿因山頂風冽嚴冬積雪屋瓦凍裂遂冶銅為瓦以覆之鐵瓦殿在華首門嘉靖四年僧昌玉同阿國真建今廢萬壽殿在悉檀寺內萬曆年麗江土知府木增同本寺僧釋禪建彌陀殿在華嚴寺內康熈甲寅僧照敏同庠生吳維相重建塔萬佛塔在迦葉殿前閣高二丈六尺煉銅為之外餙以金上鑄萬佛最為莊嚴萬曆年僧洪詔募造今廢尊勝塔在文筆山高六丈六尺四圍迴廊四十間製搆精宏遠近瞻仰崇禎戊寅麗江土知府應襲木靖同悉檀寺僧道源剏建後道真重加修整鮮聖端崇逈絕凡境飲光雙塔在華首門左右對峙各高二丈三尺萬曆己亥僧性來募周懋和建太子閣正居其中吉祥塔在牟尼山高四丈僧釋禪建祠黔國公祠在華嚴寺內萬曆間黔府張郭兩總管奉沐國公命重修華嚴寺因為沐公建長生祠於左丁酉年燬于火今故趾存焉康熈辛未僧照律重修恭節公祠在大覺寺內公劍川人己未進士任四川巴縣知縣天啟元年川中藺酋叛陷重慶府公死之闔門殉難贈光祿卿諡恭節寺僧為立祠潘朱兩代巡祠在四觀峯金頂寺內萬曆間潘直指諱𤃒者於山頂建觀風閣至天啟年朱直指諱泰禎者復建天長閣兩閣最為偉麗山頂由是香火始盛合山比丘德之為立祠肖像祀焉木太守祠在悉檀寺大殿右木公諱增號生白麗江土知府崇禎間以輸餉助邊加叅政銜萬曆丁巳公以母老祈壽拜疏於朝請建祝國悉檀寺上可其奏遂捐貲數萬延僧釋禪剏建于大龍潭上復于本寺門內建萬壽殿以致祝國之誠天啓戊辰命僧道源入京請藏經建樓供于殿左寺僧因為立祠公又于本山華嚴寺建藏經閣九重崖建一衲軒文筆山建尊勝塔院俱極精偉山中修建功德惟公為最焉
