body:
  text: 考證野史氏曰飲光為釋迦大弟子傳衣人定實在雞山宗燈不息蓋始於此山以尊者名故考訂冝詳也因首及之傳法正宗傳宋沙門契嵩著摩訶迦葉尊者摩伽陀國人也姓波羅門其父號飲澤母號香志始生質美茂其體金色而照甚遠相者曰是子夙德清勝法當出家父母憂之乃相與謀曰必美婦可縻其心稍長苦為擇娶而尊者不得已乃紿之曰非得女金色如我不可為偶父母乃以婆羅門計鑄金人輦行其國因觀者求之果得金色女如迦葉者遂以室之先是毗婆尸佛滅度後衆以其舍利建塔塔之像其面金色缺壞是時迦葉方為煅金師會有貧女持一金錢求冶為薄欲往補之迦葉聞且樂為補已因相與願世世為無𡛸夫婦以是報九十一劫體皆金色後生梵天天之壽盡乃出此婆羅門富家及是夫婦而其體復肰故初名迦葉波此曰飲光蓋取其色之義也肰皆清淨雖偶未嘗有男女意終亦懇求出家其父母從之即為沙門入山以杜多行自修令空中有告者曰佛已出世請往師之尊者即趨于竹林精舍勤敬如來乃分座命之坐而大衆皆驚謂其何以與此如來知之乃說其夙緣以斷群疑有佛說大迦葉本經在藏尋為之說法而尊者即座成道肰其積修勝德而智慧高遠故如來嘗曰我今所有大慈大悲四禪三昧無量功德以自莊嚴而迦葉比丘亦復如是一朝乃以正法付之囑其相傳無令斷絶復授金縷袈裟命之轉付彌勒及如來般大涅槃而尊者方在耆闍崛山是時地震光明照耀即以天眼知之乃謂衆曰佛涅槃矣嗟乎正法眼滅世間虛空與其徒衆即趨于拘尸那城既至乎雙樹之間而如來已化內于金棺尊者大慟遂感如來足出於棺以慰其哀慕尋致栴檀白㲲以資其闍維既而尊者謂金剛舍利冝與人天為其福力吾等比丘當務結集以惠來世為其大明即以神通自升須彌之頂而說偈曰如來弟子且莫涅槃得神通者當赴結集遂擊金鐘其偈因鐘聲而普聞故五百應真皆會於畢鉢羅岩惟阿難以漏未盡不得即預有大迦葉集藏經在藏中指阿難九罪宿戶外終夕思之及曉乃得正證遂以之叩戶相告尊者曰若肰汝可以神通自戶鑰中入阿難如其言而至是時僉議三藏者冝何為先尊者曰冝先修多羅因謂諸聖曰此阿難比丘總持第一而常侍如來其所聞法如水傳器無有遺餘冝命以集修多羅藏次命優波離以集毗尼藏復命阿難集阿毗曇達摩藏已而尊者即入願智三昧觀其所集果無謬者肰尊者處世方四十五年終以結集既畢而說法度人亦無量矣自念衰老冝入定於雞足山以待彌勒故命阿難曰昔如來將般涅槃預以正法眼付囑於我我將隱矣此復付汝汝善傳持無使斷絶乃說偈曰法法本來法無法無非法何於一法中有法有非法阿難於是作禮奉命復念如來舍利皆在諸天欲往辭之遽凌虛遍至塔廟禮已而還復以夙約必別阿闍世王及至其門會王方寢因謂閽者曰摩訶迦葉將入定於雞足山故來相別王起奏之遂以周孝王之世窅肰入其山席草而坐自念今我被糞掃服持佛僧伽黎必經五十七俱胝六十百千歲至於彌勒出世終不致壞乃語山曰若阿闍王與阿難偕來汝當為開已復合於是寂肰乃入滅盡定時也大地為之動而阿闍世王亦夢其殿梁忽折及覺而司門者果以尊者之語奏王聞泣下為之歎息即詣竹林精舍拜阿難命之同往逮至雞足山而其山闢尊者定體儼肰在其間王且哀且禮命取香薪欲為焚之阿難謂王曰未可燔也此大迦葉方以禪定持身而俟彌勒下生授佛僧伽黎乃般涅槃王聞此而敬之益勤及至與阿難引厺而其山合如故曹溪一滴雞足摩訶迦葉尊者摩伽陀國人也因世尊在靈山會上有六梵天王以金色波羅花獻佛請佛說法世尊登座拈花示衆是時百億人天皆默肰唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告曰吾以正法眼藏密付於汝汝當護持傳付將來一日因阿難問曰師兄世尊傳金襴袈裟外別傳箇甚麼迦葉召阿難阿難應諾迦葉曰倒𨚫門前剎竿著既付法與阿難尊者復以夙約必別於阿闍世王入雞足山席草而坐自念今我被糞掃服持佛僧伽黎必經五十七俱胝六十百千年至彌勒出世終不致壞彼時阿難親刻尊者像一尊遺于華首門今迦葉殿所供小像是也出白古通按傳燈録及佛祖綱目諸經書所載摩訶迦葉事皆與此同故不重録大唐西域記迦葉承佛旨任持正法結集既盡至第二十年將入定滅乃往雞足山山隂而上盤曲取路至西南岡上山𡶶險阻崕徑磐礴乃以錫杖叩剖之如割山徑既開逐路而盤紆曲折回互針通至于山頂東北面出既入山𡶶之中奉佛袈裟而立以願力故三𡶶覆斂故今此山三𡶶隆起名勝志雞足山大頂普光殿腳有石門千仞人跡罕至藏經云平陽僧法顯入西竺求經踰葱嶺而南將至雞足山路遇老人龐偉貌顯不悟其為神人頃有一沙彌至顯始問耆老為誰答曰大迦葉也顯始知即是尊者顯靈乃追至迦葉門為大石所橫不得入遂流涕而去法顯傳從貝多樹南行三里到一山名雞足大迦葉今在此山中劈山下入入處不容人下入極遠有旁孔迦葉全身在此中住孔外有迦葉洗手土彼方人若頭痛者以此土塗之即差此山中故有諸羅漢住彼方諸國道人年年往供養心濃至者夜即有羅漢來共言論釋其疑已忽肰不見此山𣝾木荗盛又多獅子虎狼不可妄行三代之時滇中原屬西域之地為阿育王所封考之佛典野史點蒼即靈鷲則此雞山為迦葉尊者入定之處無疑矣緣雞足山至漢以後始通中國而中原人覩佛書哆大多荒唐語遂以佛為非復人世所有故親覩雞山華首石門而反疑尊者未必在此蓋不知雞山當周時原在天竺幅員之內具此山前後數百里之間諸佛菩薩靈蹟顯著者甚多其為佛地可知其辨論具山水下覽者冝細詳焉星野野史氏曰九州分野懸象于天豐歉災祥於是徵焉謹則獲吉怠則貽凶人事與天行相召烏可忽也志星野分野在天屬井鬼入參七度漢書次鶉首末位晉書麗中台上位北斗開陽一星宋書太白主益州又北斗第二星主益州星經參伐流為益州元命包明堂為益州太乙書雞足於大理十之一於滇則百之一也何問乎星野肰其間有人事焉一人之身修悖之感上通于天德星之聚關乎兩家久旱飛霜係于一人况五百里之大其人事之參䥘不知幾何休咎既異則有災祲有災祲則有徵應有徵應則愈宜謹修悖矣况天文家言星氣在朝象官在人象事在野象物雞山在野獨無可象乎此固儒者所冝求詳也今考之前史併通志等書辨論紛紛詳究其說則雞山分野原屬井鬼祲祥之占循是考驗或可以無謬矣按范少伯鬼谷子張子房諸葛孔明皆云參觜益州益州入參七度越嶲入觜三度繇此言之則益州于辰為申於星為觜參於次為實沈于分為晉及考漢地志曰東井輿鬼秦之分野其界自弘農故關以西至張掖酒泉又西南牂牁越嶲益州皆冝屬焉皇甫謐帝王世紀自井十六度至柳八曰鶉首之次為秦之分野蔡雍起井十度為鶉首起畢六度為實沈李淳風以畢至井為實沈之分野屬益州僧一行以東井輿鬼為鶉首其野自漢三輔北地上郡盡西南彛越嶲益州郡繇此言之則益州於辰為未于星為井鬼于次為鶉首於分為秦夫一益州也或言其星為觜參或言為井鬼或言其次為實沈或言為鶉首此無他益之於秦地相近也參伐井鬼宿相近也實沈鶉首次相近也申與未辰相近也一行獨究之說曰懸象在天其本在地星之與土以精氣相屬而不係於方隅其占測以河山為界而不主於州國古今言分野者莫精于此矣蘇伯衡之說又曰分野指列宿所屬之星土古書已亡列辰紀天運日躔之度舍曆家取證因度舍所止而妖祥見焉則所屬之地亦可徵矣觀此則分野不可以方隅測而星主精氣相屬之說古書無存惟靜極通達者識之彼以揣摩臆度言星氣者無怪乎往往乖互也雲南幅員最廣其在西而北者皆屬井鬼其在東而南者皆屬觜參雞足一山實界滇之西北占驗之家其能舍井鬼而他適乎形勢野史氏曰地理之說形勢尚矣先王疆理九州間以山川寧止辨土宜等賦貢已哉控帶險阻變移風俗厥旨深哉雞山雖僻一隅連跨三州舊介蠻彝土俗悍魯賴迦葉之力殷重此山佛法既興人情化善感通遙邈山更以名則崇巍之興觀匪細也志形勢滇為梁州裔土蜀之苑囿河圖緯按蜀初名梁州漢武開拓滇地漸置犍為越嶲牂牁諸郡附梁州以其地漸增益故改梁州為益州元封二年乃置益州郡即今大理是也雞足山地屆三州面左賓川右鄧川後北勝而總屬大理府大理即古所謂南詔也彝人稱王為詔稱朕為况稱帝為𤾛信稱兄曰容稱弟曰鍾稱其下曰昶按滇初名六詔至唐憲宗元和十八年蒙氏以計滅五詔都於葉榆以其地在六詔之南故名南詔後改為大理國考六詔之地東西三千里南北四千六百里雞足一山蓋處六詔之中雞足山上古之世原名青巔山屬天竺國為阿育王所封故地南詔野史載周天竺國阿育王有三子王畜一神馬三子爭之王令放馬得者與之三子追至昆池東山得馬即今之金馬山長子繼至知馬已為弟得遂屯西山時碧鳳在山土人呼為碧雞至蒙氏封二神為景帝今雞足山土主神即景帝也可見金馬碧雞之名皆本於阿育王則此山疆域舊為西域無疑矣山形雄據六詔控引西番前臨蒼洱後帶金沙連接三州風和土美南有畢鉢羅窟北有石寶山此石寶在鶴慶俱菩薩顯化道場又郡志載蒼山中岩號雪山世傳為佛苦行之地草石皆有栴檀香氣叢林梵剎諸峯相望蓋舊在天竺幅員之內為阿育王封域故國有三千蘭若今存者什一耳且茲山三峯回抱萬水奔朝洞穴幽奇岩壁陡峻實甲西南且林阻谷奧而從無蛇虎之患其為佛地無疑宋太祖按地圖以玉斧畫大渡河以西棄而不有故宋人作洞天福地記南中見遺未得為通方之論矣雞足山東一百二十里至賓川州界西一百二十里至鄧川州界南八十里至賓川州界北一百二十里至北勝州界
